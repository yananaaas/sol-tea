<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кошик — Söl Tea</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.hugeicons.com/font/icons.css">
<style>
  :root {
    --cream: #F5F0E8; --cream-bright: #FDFCF9; --sand: #E8E0CC;
    --green-800: #226F54; --green-500: #7CC44A; --terra: #C4855A;
    --black: #1C1A14; --gray-800: #4A4538; --gray-500: #7A7060;
    --gray-300: #B5AFA3; --gray-100: #D9D3C7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html { background: var(--cream); overflow-x: hidden; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--black); max-width: 1440px; margin: 0 auto; }

  /* NAV */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 400; background: var(--cream); height: 80px; }
  .nav-inner { max-width: 1440px; margin: 0 auto; height: 100%; display: flex; align-items: center; gap: 32px; padding: 0 48px; }
  .nav-logo { flex-shrink: 0; display: flex; align-items: center; }
  .nav-logo a { display: flex; align-items: center; }
  .nav-logo svg { height: 42px; width: 41px; display: block; }
  .nav-links { display: flex; gap: 36px; list-style: none; flex-shrink: 0; }
  .nav-links a { font-size: 14px; font-weight: 400; color: var(--gray-800); text-decoration: none; transition: color 0.2s; }
  @media (hover: hover) { .nav-links a:hover { color: var(--green-800); } }
  .nav-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .nav-icon-btn { background: none; border: none; cursor: pointer; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: var(--black); transition: background 0.2s; font-size: 22px; position: relative; }
  @media (hover: hover) { .nav-icon-btn:hover { background: var(--sand); } }
  .nav-icon-btn.active { background: var(--sand); }
  .cart-badge, .wish-badge { position: absolute; top: 2px; right: 2px; min-width: 17px; height: 17px; border-radius: 20px; display: none; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700; color: var(--cream-bright); padding: 0 4px; line-height: 1; }
  .cart-badge { background: var(--green-800); }
  .wish-badge { background: var(--terra); }
  .cart-badge.visible, .wish-badge.visible { display: flex; }
  .burger-btn { display: none; background: none; border: none; cursor: pointer; width: 48px; height: 48px; align-items: center; justify-content: center; border-radius: 50%; color: var(--black); font-size: 22px; transition: background 0.2s; flex-shrink: 0; }
  @media (hover: hover) { .burger-btn:hover { background: var(--sand); } }

  /* BUTTONS */
  .btn-primary { background: var(--green-800); color: var(--cream-bright); border: none; border-radius: 40px; padding: 14px 28px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; display: inline-flex; align-items: center; gap: 10px; text-decoration: none; }
  @media (hover: hover) { .btn-primary:hover { background: var(--black); } }
  .btn-primary i { transform: translateX(3px); margin-right: -4px; transition: transform 0.2s; }
  @media (hover: hover) { .btn-primary:hover i { transform: translateX(7px); } }
  .btn-outline-dark { background: transparent; color: var(--green-800); border: 1.5px solid var(--green-800); border-radius: 40px; padding: 14px 28px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 10px; text-decoration: none; }
  @media (hover: hover) { .btn-outline-dark:hover { background: var(--green-800); color: var(--cream-bright); } }
  .btn-outline-dark i { transform: translateX(3px); margin-right: -4px; transition: transform 0.2s; }
  @media (hover: hover) { .btn-outline-dark:hover i { transform: translateX(7px); } }

  /* PROFILE PANEL */
  .profile-overlay { position: fixed; inset: 0; z-index: 200; opacity: 0; pointer-events: none; }
  .profile-overlay.open { opacity: 1; pointer-events: all; }
  .profile-panel { position: fixed; top: 88px; right: max(16px, calc((100vw - 1440px) / 2 + 16px)); z-index: 201; width: 360px; max-height: calc(100vh - 108px); background: var(--cream-bright); border-radius: 20px; box-shadow: 0 12px 32px rgba(28,26,20,0.12); transform: translateY(-8px) scale(0.97); opacity: 0; pointer-events: none; transition: transform 0.2s cubic-bezier(0.4,0,0.2,1), opacity 0.2s ease; display: flex; flex-direction: column; overflow-y: auto; scrollbar-width: none; font-family: 'Inter', sans-serif; }
  .profile-panel::-webkit-scrollbar { display: none; }
  .profile-panel.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }
  .pp-header { padding: 16px 16px 14px; position: relative; border-radius: 20px 20px 0 0; background: var(--cream-bright); }
  .pp-close { position: absolute; top: 12px; right: 12px; background: var(--sand); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--gray-800); transition: background 0.2s; }
  @media (hover: hover) { .pp-close:hover { background: var(--gray-100); } }
  .pp-user { display: flex; align-items: center; gap: 12px; }
  .pp-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--sand); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--gray-800); flex-shrink: 0; }
  .pp-name { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700; color: var(--black); letter-spacing: -0.01em; }
  .pp-email { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--gray-500); margin-top: 2px; font-weight: 400; }
  .pp-body { padding: 8px 8px 16px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .pp-section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-500); padding: 14px 12px 6px; }
  .pp-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 16px; cursor: pointer; transition: background 0.2s; text-decoration: none; color: var(--black); }
  @media (hover: hover) { .pp-item:hover { background: var(--sand); } }
  .pp-item-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--sand); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--green-800); flex-shrink: 0; transition: all 0.2s; }
  .pp-item-text { flex: 1; }
  .pp-item-title { font-size: 14px; font-weight: 500; color: var(--black); }
  .pp-item-sub { font-size: 11px; color: var(--gray-500); margin-top: 1px; }
  .pp-item-badge { background: var(--green-500); color: var(--cream-bright); border-radius: 20px; padding: 4px 10px; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; font-family: 'DM Sans', sans-serif; }
  .pp-item-arrow { font-size: 16px; color: var(--gray-300); opacity: 0; transition: opacity 0.2s, transform 0.2s; }
  @media (hover: hover) { .pp-item:hover .pp-item-arrow { opacity: 1; transform: translateX(4px); } }
  .pp-logout { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 16px; cursor: pointer; color: #E84A2E; font-size: 14px; font-weight: 500; border: none; background: none; font-family: 'Inter', sans-serif; width: 100%; transition: background 0.2s; margin-top: 4px; }
  @media (hover: hover) { .pp-logout:hover { background: rgba(232,74,46,0.07); } }
  .pp-logout .pp-item-icon { background: rgba(232,74,46,0.12); color: #E84A2E; }

  /* BURGER / MOBILE MENU */
  .mobile-menu-overlay { position: fixed; inset: 0; z-index: 200; opacity: 0; pointer-events: none; }
  .mobile-menu-overlay.open { opacity: 1; pointer-events: all; }
  .mobile-menu { position: fixed; top: 80px; right: max(16px, calc((100vw - 1440px) / 2 + 16px)); z-index: 201; width: 240px; background: var(--sand); border-radius: 20px; padding: 8px; box-shadow: 0 8px 32px rgba(28,26,20,0.14); transform: translateY(-8px) scale(0.97); opacity: 0; pointer-events: none; transition: transform 0.2s cubic-bezier(0.4,0,0.2,1), opacity 0.2s ease; font-family: 'DM Sans', sans-serif; }
  .mobile-menu.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }
  .mm-nav { display: flex; flex-direction: column; gap: 4px; }
  .mm-item { display: flex; align-items: center; padding: 12px 18px; border-radius: 40px; text-decoration: none; color: var(--gray-800); transition: background 0.15s; }
  @media (hover: hover) { .mm-item:hover { background: var(--gray-100); } }
  .mm-item.active { background: var(--green-800); color: var(--cream-bright); }
  .mm-item-title { font-size: 14px; font-weight: 500; }
  .mm-footer { padding: 8px 18px 4px; border-top: 0.5px solid var(--gray-100); margin-top: 4px; }
  .mm-footer-text { font-size: 11px; color: var(--gray-300); padding: 8px 0; }

  /* BADGES */
  .item-badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }

  /* NAV SEARCH CLEAR */
  @media (hover: hover) { .nav-search-clear:hover { color: var(--black); } }

  
  /* SCROLL TO TOP */
  .scroll-top { position: fixed; bottom: 32px; right: max(40px, calc((100vw - 1440px) / 2 + 40px)); z-index: 50; width: 48px; height: 48px; background: var(--cream); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; color: var(--gray-500); transition: opacity 0.3s, transform 0.3s, background 0.2s; opacity: 0; pointer-events: none; box-shadow: 0 0 0 1.5px var(--gray-100); }
  .scroll-top.visible { opacity: 1; pointer-events: all; }
  @media (hover: hover) { .scroll-top:hover { background: var(--sand); color: var(--green-800); transform: translateY(-3px); } }

  /* ============================
     CART PAGE
     ============================ */

  /* HERO */
  .cart-hero { margin-top: 80px; padding: 52px 48px 24px; }
  .cart-hero-inner { max-width: 1280px; margin: 0 auto; }
  .cart-hero h1 { font-family: 'Inter', sans-serif; font-size: clamp(40px, 5vw, 64px); font-weight: 900; letter-spacing: -0.03em; line-height: 1; color: var(--black); }

  /* TAB BAR */
  .tab-bar { position: sticky; top: 80px; z-index: 99; background: var(--cream); padding: 0 48px 36px; }
  .tab-bar-inner { display: flex; gap: 8px; max-width: 1280px; margin: 0 auto; }
  .tab-pill { display: inline-flex; align-items: center; gap: 8px; background: var(--sand); color: var(--gray-800); border: none; border-radius: 40px; padding: 10px 20px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .tab-pill.active { background: var(--green-800); color: var(--cream-bright); }
  @media (hover: hover) { .tab-pill:hover:not(.active) { background: var(--gray-100); } }
  .tab-count { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; color: var(--green-800); }
  .tab-count.wish-count { color: var(--terra); }
  .tab-pill.active .tab-count, .tab-pill.active .tab-count.wish-count { color: var(--cream-bright); }

  /* CART SECTION */
  .cart-section { padding: 0 48px 60px; }
  .cart-section-inner { max-width: 1280px; margin: 0 auto; }
  .cart-layout { display: grid; grid-template-columns: 1fr 380px; gap: 48px; align-items: start; }

  /* CART ITEMS */
  .cart-items { display: flex; flex-direction: column; }
  .cart-item { display: flex; align-items: flex-start; gap: 20px; padding: 20px 0; }
  .cart-item:first-child { padding-top: 0; }
  .cart-item:last-child { padding-bottom: 0; }
  .cart-item-img { width: 88px; height: 88px; border-radius: 16px; background: var(--sand); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-300); cursor: pointer; overflow: hidden; }
  .cart-item-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 12px; }
  .cart-item-top { display: flex; align-items: flex-start; gap: 8px; }
  .cart-item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .cart-item-name { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700; color: var(--black); letter-spacing: -0.01em; cursor: pointer; transition: color 0.2s; display: inline; }
  @media (hover: hover) { .cart-item-name:hover { color: var(--green-800); } }
  .cart-item-desc { font-size: 13px; color: var(--gray-500); line-height: 1.5; }
  .cart-item-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .cart-item-controls { display: flex; align-items: center; gap: 10px; }
  .cart-item-price { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 900; color: var(--green-800); }

  /* REMOVE BUTTON */
  .cart-item-remove { width: 36px; height: 36px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--gray-300); transition: all 0.2s; flex-shrink: 0; }
  @media (hover: hover) { .cart-item-remove:hover { background: rgba(232,74,46,0.08); color: #E84A2E; } }

  /* CART SUMMARY */
  .cart-summary { background: var(--cream-bright); border-radius: 24px; padding: 28px; position: sticky; top: 168px; }
  .summary-title { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 800; color: var(--black); letter-spacing: -0.02em; margin-bottom: 24px; }
  .summary-rows { display: flex; flex-direction: column; gap: 14px; }
  .summary-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .summary-label { font-size: 14px; color: var(--gray-500); }
  .summary-value { font-size: 14px; font-weight: 500; color: var(--black); text-align: right; }
  .summary-value.free { color: var(--green-800); font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
  .summary-total-row { display: flex; justify-content: space-between; align-items: center; padding-top: 20px; margin-top: 6px; }
  .summary-total-label { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; color: var(--black); }
  .summary-total-value { font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 900; color: var(--green-800); }
  .btn-checkout { display: flex; width: 100%; align-items: center; justify-content: center; gap: 10px; background: var(--green-800); color: var(--cream-bright); border: none; border-radius: 40px; padding: 16px 28px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 20px; text-decoration: none; transition: background 0.2s; }
  @media (hover: hover) { .btn-checkout:hover { background: var(--black); } }
  .btn-checkout i { transition: transform 0.2s; }
  @media (hover: hover) { .btn-checkout:hover i { transform: translateX(4px); } }
  .summary-note { margin-top: 14px; font-size: 12px; color: var(--gray-500); text-align: center; line-height: 1.6; }
  .delivery-progress { margin: 16px 0 4px; }
  .delivery-progress-bar { height: 4px; background: var(--gray-100); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
  .delivery-progress-fill { height: 100%; background: var(--green-800); border-radius: 4px; transition: width 0.4s ease; }
  .delivery-progress-text { font-size: 12px; color: var(--gray-500); }
  .delivery-progress-text strong { color: var(--black); }

  /* EMPTY STATE */
  .cart-empty-layout { grid-template-columns: 1fr !important; }
  .empty-state { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 80px 40px; gap: 16px; }
  .empty-state h3 { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 700; color: var(--black); letter-spacing: -0.01em; }
  .empty-state p { font-size: 15px; color: var(--gray-500); line-height: 1.6; }
  .empty-state-btn { background: var(--green-800); color: var(--cream-bright); border: none; border-radius: 40px; padding: 14px 28px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; display: inline-flex; align-items: center; gap: 10px; text-decoration: none; margin-top: 8px; }
  @media (hover: hover) { .empty-state-btn:hover { background: var(--black); } }
  .empty-state-btn i { transform: translateX(3px); margin-right: -4px; transition: transform 0.2s; }
  @media (hover: hover) { .empty-state-btn:hover i { transform: translateX(7px); } }

  /* WISHLIST SECTION */
  .wish-section { padding: 0 48px 60px; }
  .wish-section-inner { max-width: 1280px; margin: 0 auto; }
  .wish-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; }

  /* PRODUCT CARD — identical component to sol-shop.html */
  @media (hover: hover) { .product-card.show:hover { transform: translateY(-6px); } }
  @media (hover: hover) { .product-wish:hover { color: var(--terra); } }
  
  /* MOBILE */
  @media (max-width: 768px) {
    nav { height: 72px; }
    .nav-inner { padding: 0 16px; gap: 4px; }
    .nav-links { display: none; }
    .nav-faq { display: none; }
    .nav-right { gap: 0; margin-left: auto; }
    .burger-btn { display: flex; }
    .mobile-menu { top: 76px; }
    .scroll-top { bottom: 20px; right: 20px; }
    .profile-panel { top: 76px; right: 8px; left: 8px; width: auto; max-height: calc(100svh - 84px); }
    .pp-header { padding: 14px 14px 12px; }
    .pp-body { padding: 6px 6px 12px; }
    .pp-item-icon { width: 44px; height: 44px; font-size: 22px; }
    .pp-avatar { width: 52px; height: 52px; font-size: 22px; }

    /* CART MOBILE */
    .cart-hero { margin-top: 72px; padding: 24px 24px 20px; }
    .cart-hero h1 { font-size: clamp(28px, 8vw, 40px); }
    .tab-bar { top: 72px; padding: 0 16px 24px; }
    .tab-bar-inner { gap: 6px; }
    .tab-pill { font-size: 13px; padding: 9px 16px; }
    .cart-section { padding: 0 16px 48px; }
    .cart-layout { grid-template-columns: 1fr; gap: 0; }
    .cart-item { gap: 14px; padding: 20px 0; }
    .cart-item-img { width: 72px; height: 72px; border-radius: 14px; }
    .cart-item-name { font-size: 14px; }
    .cart-summary { position: static; margin-top: 24px; border-radius: 20px; padding: 24px; }
    .wish-section { padding: 0 16px 48px; }
    .wish-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .empty-state { padding: 60px 24px; }
  }

  @media (max-width: 480px) {
    .wish-grid { grid-template-columns: 1fr; }
  }

  @media (min-width: 769px) and (max-width: 1100px) {
    .wish-grid { grid-template-columns: repeat(3, 1fr); }
    .cart-layout { grid-template-columns: 1fr 340px; gap: 32px; }
  }
</style>
<script src="components/sol-search.js"></script>
<script src="components/sol-nav.js"></script>
<script src="components/sol-footer.js"></script>
<script src="components/sol-product-card.js"></script>
<script src="components/sol-counter.js"></script>
<script src="services/sol-catalog.js"></script>
</head>
<body>

<!-- NAV -->
<sol-nav active="cart"></sol-nav>

<!-- HERO -->
<header class="cart-hero">
  <div class="cart-hero-inner">
    <h1>Кошик</h1>
  </div>
</header>

<!-- TAB BAR -->
<div class="tab-bar">
  <div class="tab-bar-inner">
    <button class="tab-pill active" id="tabCart" onclick="switchTab('cart')">
      Кошик
      <span class="tab-count" id="cartTabCount" style="display:none"></span>
    </button>
    <button class="tab-pill" id="tabWish" onclick="switchTab('wish')">
      Вподобане
      <span class="tab-count wish-count" id="wishTabCount" style="display:none"></span>
    </button>
  </div>
</div>

<!-- CART PANE -->
<div id="cartPane">
  <section class="cart-section">
    <div class="cart-section-inner">
      <div class="cart-layout" id="cartLayout">
        <div class="cart-items" id="cartItems"></div>
        <div id="cartSummary"></div>
      </div>
    </div>
  </section>
</div>

<!-- WISHLIST PANE -->
<div id="wishPane" style="display:none">
  <section class="wish-section">
    <div class="wish-section-inner">
      <div class="wish-grid" id="wishGrid"></div>
    </div>
  </section>
</div>

<!-- FOOTER -->
<sol-footer></sol-footer>

<button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="hgi-stroke hgi-arrow-up-01"></i></button>


<script>
// ========================
// PRODUCT DATA
// ========================
let allProducts = [];
let PRODUCT_MAP = {};

function buildProductMap(list) {
  PRODUCT_MAP = {};
  list.forEach(p => { PRODUCT_MAP[p.name] = p; });
}

const BADGE_LABELS = { new: 'Новинка', limited: 'Обмежений' };

// Short IDs from sol-tea.html wishlist
const WISH_ID_MAP = {
  teg: 'Те Гуань Інь',
  shen: 'Шен Пуер 2019',
  feng: 'Фенхуан Даньцун',
  shu: 'Шу Пуер Старий'
};

const FREE_DELIVERY_THRESHOLD = 1000;

// ========================
// STORAGE
// ========================
function getCart() { try { return JSON.parse(sessionStorage.getItem('solCart')) || []; } catch(e) { return []; } }
function saveCart(c) { sessionStorage.setItem('solCart', JSON.stringify(c)); }
function getWish() { try { return JSON.parse(sessionStorage.getItem('solWish')) || []; } catch(e) { return []; } }
function saveWish(w) { sessionStorage.setItem('solWish', JSON.stringify(w)); }
function toggleWish(btn, name) {
  const w = getWish();
  const i = w.indexOf(name);
  if (i === -1) w.push(name); else w.splice(i, 1);
  saveWish(w);
  btn.classList.toggle('liked', w.includes(name));
  updateWishBadge();
}

// ========================
// BADGES
// ========================
function updateCartBadge() {
  const n = getCart().reduce((s, i) => s + i.qty, 0);
  const el = document.getElementById('cartBadge');
  if (!el) return;
  el.textContent = n;
  el.classList.toggle('visible', n > 0);
}
function updateWishBadge() {
  const n = getWish().length;
  const el = document.getElementById('wishBadge');
  if (!el) return;
  el.textContent = n;
  el.classList.toggle('visible', n > 0);
}
function updateCartTabCount() {
  const n = getCart().reduce((s, i) => s + i.qty, 0);
  const el = document.getElementById('cartTabCount');
  if (!el) return;
  el.textContent = n;
  el.style.display = n > 0 ? '' : 'none';
}
function updateWishTabCount() {
  const n = getWish().length;
  const el = document.getElementById('wishTabCount');
  if (!el) return;
  el.textContent = n;
  el.style.display = n > 0 ? '' : 'none';
}

// ========================
// TAB SWITCHING
// ========================
let activeTab = 'cart';

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabCart').classList.toggle('active', tab === 'cart');
  document.getElementById('tabWish').classList.toggle('active', tab === 'wish');
  document.getElementById('cartPane').style.display = tab === 'cart' ? '' : 'none';
  document.getElementById('wishPane').style.display = tab === 'wish' ? '' : 'none';
  if (tab === 'cart') renderCart();
  else renderWishlist();
}

// ========================
// CART RENDERING
// ========================
function renderCart() {
  const cart = getCart();
  const itemsEl = document.getElementById('cartItems');
  const summaryEl = document.getElementById('cartSummary');

  updateCartTabCount();

  if (cart.length === 0) {
    document.getElementById('cartLayout').classList.add('cart-empty-layout');
    itemsEl.innerHTML = `
      <div class="empty-state">
        <h3>Кошик порожній</h3>
        <p>Додайте щось зі свого вподобаного або перегляньте колекцію</p>
        <a href="sol-shop.html" class="empty-state-btn">До магазину <i class="hgi-stroke hgi-arrow-right-01"></i></a>
      </div>`;
    summaryEl.innerHTML = '';
    return;
  }
  document.getElementById('cartLayout').classList.remove('cart-empty-layout');

  const subtotal = cart.reduce((s, i) => {
    const p = PRODUCT_MAP[i.name];
    return s + (p ? p.price * i.qty : 0);
  }, 0);
  const totalQty = cart.reduce((s, i) => s + i.qty, 0);
  const freeDelivery = subtotal >= FREE_DELIVERY_THRESHOLD;
  const progress = Math.min(subtotal / FREE_DELIVERY_THRESHOLD, 1);
  const toFree = FREE_DELIVERY_THRESHOLD - subtotal;

  itemsEl.innerHTML = cart.map(item => {
    const p = PRODUCT_MAP[item.name] || {};
    const itemTotal = (p.price || 0) * item.qty;
    const safeN = item.name.replace(/'/g, "\\'");
    const attrN = item.name.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    const badgeHtml = p.badge ? `<span class="item-badge badge-${p.badge}">${BADGE_LABELS[p.badge] || ''}</span>` : '';
    return `
      <div class="cart-item">
        <div class="cart-item-img" style="${p.bg ? 'background:' + p.bg : ''}" onclick="goToProduct('${safeN}')">Фото</div>
        <div class="cart-item-main">
          <div class="cart-item-top">
            <div class="cart-item-info">
              <span class="cart-item-name" onclick="goToProduct('${safeN}')">${item.name}</span>
              ${p.desc ? `<div class="cart-item-desc">${p.desc}</div>` : ''}
              ${badgeHtml ? `<div class="cart-item-meta">${badgeHtml}</div>` : ''}
            </div>
            <button class="cart-item-remove" title="Видалити" onclick="removeFromCart('${safeN}')">
              <i class="hgi-stroke hgi-cancel-01"></i>
            </button>
          </div>
          <div class="cart-item-controls">
            <sol-counter value="${item.qty}" min="1" data-name="${attrN}"></sol-counter>
            <span class="cart-item-price">${SolCatalog.formatPrice(itemTotal, 'UAH')}</span>
          </div>
        </div>
      </div>`;
  }).join('');

  const deliveryHtml = freeDelivery
    ? `<div class="summary-row"><span class="summary-label">Доставка</span><span class="summary-value free"><i class="hgi-stroke hgi-checkmark-circle-02"></i> Безкоштовна</span></div>`
    : `<div class="summary-row"><span class="summary-label">Доставка</span><span class="summary-value">Нова Пошта</span></div>
       <div class="delivery-progress">
         <div class="delivery-progress-bar"><div class="delivery-progress-fill" style="width:${progress * 100}%"></div></div>
         <div class="delivery-progress-text">До безкоштовної доставки: <strong>${SolCatalog.formatPrice(toFree, 'UAH')}</strong></div>
       </div>`;

  summaryEl.innerHTML = `
    <div class="cart-summary">
      <div class="summary-title">Ваше замовлення</div>
      <div class="summary-rows">
        <div class="summary-row">
          <span class="summary-label">Товари (${totalQty} шт.)</span>
          <span class="summary-value">${SolCatalog.formatPrice(subtotal, 'UAH')}</span>
        </div>
        ${deliveryHtml}
      </div>
      <div class="summary-total-row">
        <span class="summary-total-label">До оплати</span>
        <span class="summary-total-value">${SolCatalog.formatPrice(subtotal, 'UAH')}</span>
      </div>
      <a href="sol-checkout.html" class="btn-checkout">Оформити замовлення <i class="hgi-stroke hgi-arrow-right-01"></i></a>
      <p class="summary-note">Оплата карткою або при отриманні</p>
    </div>`;

  itemsEl.querySelectorAll('sol-counter').forEach(c => {
    c.addEventListener('change', e => changeQty(c.dataset.name, e.detail.delta));
  });
}

// ========================
// CART OPERATIONS
// ========================
function changeQty(name, delta) {
  const cart = getCart();
  const item = cart.find(c => c.name === name);
  if (!item) return;
  item.qty = Math.max(1, item.qty + delta);
  saveCart(cart);
  renderCart();
  updateCartBadge();
}

function removeFromCart(name) {
  let cart = getCart();
  cart = cart.filter(c => c.name !== name);
  saveCart(cart);
  renderCart();
  updateCartBadge();
}

// ========================
// WISHLIST RENDERING
// ========================
function renderWishlist() {
  const wish = getWish();
  const grid = document.getElementById('wishGrid');
  const cart = getCart();

  updateWishTabCount();

  if (wish.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <h3>Вподобаних немає</h3>
        <p>Натисніть на серце поруч з товаром, щоб зберегти його тут</p>
        <a href="sol-shop.html" class="empty-state-btn">Переглянути колекцію <i class="hgi-stroke hgi-arrow-right-01"></i></a>
      </div>`;
    return;
  }

  const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
  grid.innerHTML = wish.map((id, i) => {
    const name = WISH_ID_MAP[id] || id;
    const p = PRODUCT_MAP[name] || {};
    const priceStr = p.price ? SolCatalog.formatPrice(p.price, p.currency) : '—';
    return `<sol-product-card
      name="${esc(name)}"
      region="${esc(p.region||'')}"
      desc="${esc(p.desc||'')}"
      price="${esc(priceStr)}"
      bg="${esc(p.bg||'')}"
      badge="${esc(p.badge||'')}"
      index="${i}"
      wish-id="${esc(id)}"
      cart-fn="toggleWishCart"
      liked></sol-product-card>`;
  }).join('');

  requestAnimationFrame(() => requestAnimationFrame(() => {
    grid.querySelectorAll('sol-product-card').forEach(c => c.show && c.show());
  }));
}

// ========================
// WISHLIST OPERATIONS
// ========================
function toggleWishCart(name, btn) {
  const cart = getCart();
  const idx = cart.findIndex(c => c.name === name);
  if (idx === -1) {
    cart.push({ name, qty: 1 });
    btn.innerHTML = '<i class="hgi-stroke hgi-checkmark-circle-02"></i>';
    btn.classList.add('in-cart');
    btn.title = 'В кошику';
  } else {
    cart.splice(idx, 1);
    btn.innerHTML = '<i class="hgi-stroke hgi-shopping-bag-add"></i>';
    btn.classList.remove('in-cart');
    btn.title = 'В кошик';
  }
  saveCart(cart);
  updateCartBadge();
  updateCartTabCount();
}

function removeFromWish(id) {
  let wish = getWish();
  wish = wish.filter(w => w !== id);
  saveWish(wish);
  updateWishBadge();
  renderWishlist();
}

// ========================
// NAVIGATION
// ========================
function goToProduct(name) { window.location.href = 'sol-product.html?name=' + encodeURIComponent(name); }

// ========================
// NAV: PROFILE + MENU + SEARCH
// ========================
function toggleProfile() {
  const p = document.getElementById('profilePanel'), o = document.getElementById('profileOverlay');
  const open = p.classList.contains('open');
  p.classList.toggle('open', !open); o.classList.toggle('open', !open);
  document.body.style.overflow = open ? '' : 'hidden';
}
function toggleMobileMenu() {
  const m = document.getElementById('mobileMenu'), o = document.getElementById('mobileMenuOverlay');
  const open = m.classList.contains('open');
  m.classList.toggle('open', !open); o.classList.toggle('open', !open);
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeSearch();
    ['profilePanel','profileOverlay','mobileMenu','mobileMenuOverlay'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.remove('open');
    });
    document.body.style.overflow = '';
  }
});

window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTopBtn');
  btn.classList.toggle('visible', window.scrollY > 400);
  const socials = document.querySelector('.footer-socials');
  if (socials) {
    const socialsTop = socials.getBoundingClientRect().top;
    const defaultBottom = window.innerWidth <= 768 ? 20 : 32;
    btn.style.bottom = socialsTop < window.innerHeight
      ? (window.innerHeight - socialsTop + 16) + 'px'
      : defaultBottom + 'px';
  }
});

// ========================
// INIT
// ========================
(function init() {
  const params = new URLSearchParams(window.location.search);
  const tabParam = params.get('tab');

  updateCartBadge();
  updateWishBadge();
  updateCartTabCount();
  updateWishTabCount();

  SolCatalog.load().then(data => {
    allProducts = data;
    buildProductMap(data);
    if (tabParam === 'wish') {
      switchTab('wish');
    } else {
      renderCart();
    }
  }).catch(err => {
    console.error('[sol-cart] failed to load catalog', err);
    if (tabParam === 'wish') switchTab('wish'); else renderCart();
  });
})();
</script>
