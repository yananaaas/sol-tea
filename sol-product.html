<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Товар — Söl Tea</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.hugeicons.com/font/icons.css">
<style>
  :root {
    --cream: #F5F0E8; --cream-bright: #FDFCF9; --sand: #E8E0CC;
    --green-800: #226F54; --green-500: #7CC44A; --terra: #C4855A;
    --black: #1C1A14; --gray-800: #4A4538; --gray-500: #7A7060;
    --gray-300: #B5AFA3; --gray-100: #D9D3C7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html { background: var(--cream); overflow-x: hidden; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--black); max-width: 1440px; margin: 0 auto; }

  /* NAV */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 400; background: var(--cream); height: 80px; }
  .nav-inner { max-width: 1440px; margin: 0 auto; height: 100%; display: flex; align-items: center; gap: 32px; padding: 0 48px; }
  .nav-logo { flex-shrink: 0; display: flex; align-items: center; }
  .nav-logo a { display: flex; align-items: center; }
  .nav-logo svg { height: 42px; width: 41px; display: block; }
  .nav-links { display: flex; gap: 36px; list-style: none; flex-shrink: 0; }
  .nav-links a { font-size: 14px; font-weight: 400; color: var(--gray-800); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: var(--green-800); }
  .nav-links a.active { color: var(--green-800); font-weight: 500; }
  .nav-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .nav-icon-btn { background: none; border: none; cursor: pointer; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: var(--black); transition: background 0.2s; font-size: 22px; position: relative; }
  .nav-icon-btn:hover { background: var(--sand); }
  .cart-badge, .wish-badge { position: absolute; top: 2px; right: 2px; min-width: 17px; height: 17px; border-radius: 20px; display: none; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700; color: var(--cream-bright); padding: 0 4px; line-height: 1; }
  .cart-badge { background: var(--green-800); }
  .wish-badge { background: var(--terra); }
  .cart-badge.visible, .wish-badge.visible { display: flex; }
  .burger-btn { display: none; background: none; border: none; cursor: pointer; width: 48px; height: 48px; align-items: center; justify-content: center; border-radius: 50%; color: var(--black); font-size: 22px; transition: background 0.2s; flex-shrink: 0; }
  .burger-btn:hover { background: var(--sand); }

  /* BUTTONS */
  .btn-add { background: var(--black); color: var(--cream-bright); border: none; border-radius: 40px; padding: 14px 28px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; white-space: nowrap; display: inline-flex; align-items: center; gap: 10px; }
  .btn-add i { font-size: 20px; }
  .btn-add.in-cart { background: var(--green-800); }
  @media (hover: hover) {
    .btn-add:hover { background: var(--green-800); }
    .btn-add.in-cart:hover { background: var(--black); }
  }
  .btn-add-sm { background: var(--black); color: var(--cream-bright); border: none; border-radius: 40px; padding: 10px 18px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.2s; white-space: nowrap; display: inline-flex; align-items: center; gap: 8px; }
  .btn-add-sm i { font-size: 18px; }
  .btn-add-sm.in-cart { background: var(--green-800); }
  @media (hover: hover) {
    .btn-add-sm:hover { background: var(--green-800); }
    .btn-add-sm.in-cart:hover { background: var(--black); }
  }

  /* PAGE WRAP */
  .product-wrap { padding: 0 48px; margin-top: 80px; }

  /* BREADCRUMB */
  .product-breadcrumb { display: flex; align-items: center; gap: 10px; padding: 32px 0 28px; font-size: 14px; color: var(--gray-500); }
  .product-breadcrumb a { color: var(--gray-500); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: color 0.2s; }
  .product-breadcrumb a:hover { color: var(--green-800); }
  .product-breadcrumb a i { font-size: 16px; }
  .bc-sep { color: var(--gray-300); }
  .bc-current { color: var(--black); font-weight: 500; }

  /* PRODUCT HERO */
  .product-hero { display: grid; grid-template-columns: 55fr 45fr; column-gap: 64px; padding-bottom: 60px; align-items: start; }

  /* GALLERY */
  .gallery-sticky { position: sticky; top: 100px; }
  .gallery-viewport { position: relative; border-radius: 24px; overflow: hidden; aspect-ratio: 4/3; background: var(--sand); }
  .gallery-slide { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-300); opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
  .gallery-slide.active { opacity: 1; pointer-events: auto; }
  .gallery-badge { position: absolute; bottom: 16px; left: 16px; z-index: 2; border-radius: 20px; padding: 6px 16px; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  .badge-new { background: var(--green-500); color: var(--cream-bright); }
  .badge-limited { background: var(--terra); color: var(--cream-bright); }
  .gallery-arrow { position: absolute; top: 50%; transform: translateY(-50%); z-index: 3; background: rgba(253,252,249,0.88); border: none; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--black); transition: background 0.2s; }
  .gallery-arrow-prev { left: 12px; }
  .gallery-arrow-next { right: 12px; }
  @media (hover: hover) { .gallery-arrow:hover { background: var(--cream-bright); } }
  .gallery-arrow:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .gallery-nav { display: flex; gap: 24px; padding-top: 16px; }
  .gallery-thumb { flex: 1; aspect-ratio: 1/1; border-radius: 20px; background: var(--sand); cursor: pointer; overflow: hidden; border: 2px solid transparent; transition: border-color 0.2s, opacity 0.2s; opacity: 0.55; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--gray-300); letter-spacing: 0.06em; text-transform: uppercase; }
  .gallery-thumb.active { border-color: var(--green-800); opacity: 1; }
  @media (hover: hover) { .gallery-thumb:hover { opacity: 0.8; } }

  /* PRODUCT INFO */
  .product-info { padding-top: 4px; }
  .pi-region { position: absolute; top: 16px; left: 16px; z-index: 2; background: rgba(253,252,249,0.92); color: var(--gray-800); border-radius: 40px; padding: 6px 16px; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; }
  .pi-wish { position: absolute; top: 12px; right: 12px; z-index: 2; background: rgba(253,252,249,0.88); border: none; cursor: pointer; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--gray-500); transition: color 0.2s, background 0.2s; }
  .pi-wish.liked { color: var(--terra); }
  @media (hover: hover) { .pi-wish:hover { background: var(--cream-bright); color: var(--terra); } }
  .product-info h1 { font-family: 'Inter', sans-serif; font-size: 36px; font-weight: 900; letter-spacing: -0.02em; color: var(--black); line-height: 1.1; margin-bottom: 14px; }
  .pi-desc { font-size: 15px; color: var(--gray-500); line-height: 1.55; margin-bottom: 10px; }
  .pi-longdesc { font-size: 15px; color: var(--gray-800); line-height: 1.65; margin-bottom: 32px; }
  .pi-gram-label { font-size: 12px; font-weight: 500; color: var(--gray-500); margin-bottom: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
  .pi-grams { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
  .gram-pill { background: var(--sand); color: var(--gray-800); border-radius: 40px; padding: 9px 18px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: all 0.2s; white-space: nowrap; }
  .gram-pill:hover { background: var(--gray-100); }
  .gram-pill.active { background: var(--green-800); color: var(--cream-bright); }
  .pi-bottom { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .pi-price { font-family: 'Inter', sans-serif; font-size: 32px; font-weight: 900; color: var(--green-800); letter-spacing: -0.02em; }

  .btn-outline-dark { background: transparent; color: var(--green-800); border: 1.5px solid var(--green-800); border-radius: 40px; padding: 14px 28px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 10px; }
  @media (hover: hover) { .btn-outline-dark:hover { background: var(--green-800); color: var(--cream-bright); } }

  /* NOT FOUND */
  .not-found { padding: 80px 0; text-align: center; }
  .not-found h2 { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 900; margin-bottom: 16px; }
  .not-found p { color: var(--gray-500); margin-bottom: 32px; }
  .not-found a { color: var(--green-800); text-decoration: none; font-weight: 500; }

  /* BREW INLINE */
  .pi-brew { padding-top: 40px; }
  .pi-brew-title { font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 900; letter-spacing: -0.02em; color: var(--black); margin-bottom: 10px; }
  .pi-brew-text { font-size: 15px; color: var(--gray-500); line-height: 1.65; }

  /* REVIEWS SECTION */
  .reviews-section { padding: 60px 48px; background: var(--cream); }
  .reviews-header { display: flex; align-items: center; gap: 14px; margin-bottom: 40px; }
  .btn-leave-review { margin-left: auto; }
  .reviews-section h2 { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 900; letter-spacing: -0.02em; }
  .reviews-count-lbl { font-size: 14px; color: var(--gray-500); }
  .reviews-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .testimonial { background: var(--cream-bright); border-radius: 20px; padding: 32px; display: flex; flex-direction: column; gap: 24px; }
  .testimonial-text { font-size: 15px; line-height: 1.7; color: var(--black); flex: 1; }
  .testimonial-footer { display: flex; align-items: center; justify-content: space-between; }
  .testimonial-user { display: flex; align-items: center; gap: 12px; }
  .testimonial-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--green-800); display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 800; color: var(--cream-bright); flex-shrink: 0; }
  .testimonial-name { font-size: 14px; font-weight: 600; color: var(--black); }
  .testimonial-handle { font-size: 12px; color: var(--gray-500); }
  .testimonial-rating { background: var(--green-800); color: var(--cream-bright); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 500; white-space: nowrap; }
  .product-wish { position: absolute; top: 12px; right: 12px; width: 44px; height: 44px; border-radius: 50%; background: rgba(253,252,249,0.9); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; color: var(--gray-300); transition: color 0.2s; border: none; }
  .product-wish.liked { color: var(--terra); }
  @media (hover: hover) { .product-wish:hover { color: var(--terra); } }
  .reviews-empty { font-size: 15px; color: var(--gray-500); }

  /* SIMILAR SECTION */
  .similar-section { padding: 60px 48px; background: var(--cream); }
  .similar-section h2 { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 40px; }
  .similar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
  .product-card { background: var(--cream-bright); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; transition: transform 0.3s; }
  @media (hover: hover) { .product-card:hover { transform: translateY(-6px); } }
  .product-img { aspect-ratio: 4/3; background: var(--sand); position: relative; display: flex; align-items: center; justify-content: center; color: var(--gray-300); font-size: 11px; letter-spacing: 0.08em; }
  .product-region { position: absolute; top: 12px; left: 12px; background: rgba(253,252,249,0.92); border-radius: 20px; padding: 6px 16px; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-800); }
  .product-badge { position: absolute; bottom: 12px; left: 12px; border-radius: 20px; padding: 6px 16px; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  .product-body { padding: 24px; flex: 1; display: flex; flex-direction: column; }
  .product-body h4 { font-family: 'Inter', sans-serif; font-size: 17px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.01em; color: var(--black); }
  .product-body p { font-size: 12px; color: var(--gray-500); line-height: 1.6; flex: 1; }
  .product-footer { margin-top: auto; display: flex; align-items: center; justify-content: space-between; padding-top: 16px; }
  .product-price { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 900; color: var(--green-800); letter-spacing: -0.02em; }

  /* SCROLL TOP */
  .scroll-top { position: fixed; bottom: 32px; right: max(40px, calc((100vw - 1440px) / 2 + 40px)); z-index: 50; width: 48px; height: 48px; background: var(--cream); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; color: var(--gray-500); transition: opacity 0.3s, transform 0.3s, background 0.2s; opacity: 0; pointer-events: none; box-shadow: 0 0 0 1.5px var(--gray-100); }
  .scroll-top.visible { opacity: 1; pointer-events: all; }
  .scroll-top:hover { background: var(--sand); color: var(--green-800); transform: translateY(-3px); }

  /* FOOTER */

  /* MOBILE MENU */
  .mobile-menu-overlay { display: none; position: fixed; inset: 0; background: rgba(28,26,20,0.3); z-index: 399; backdrop-filter: blur(4px); }
  .mobile-menu-overlay.open { display: block; }
  .mobile-menu { position: fixed; top: 76px; right: max(16px, calc((100vw - 1440px) / 2 + 16px)); background: var(--sand); border-radius: 20px; padding: 8px; z-index: 401; transform: scale(0.95) translateY(-8px); opacity: 0; pointer-events: none; transition: transform 0.2s ease, opacity 0.2s ease; min-width: 220px; }
  .mobile-menu.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }
  .mm-nav { display: flex; flex-direction: column; gap: 2px; }
  .mm-item { display: flex; align-items: center; padding: 14px 16px; border-radius: 14px; text-decoration: none; color: var(--black); transition: background 0.2s; gap: 12px; }
  .mm-item:hover, .mm-item.active { background: var(--gray-100); }
  .mm-item-title { font-size: 15px; font-weight: 500; }
  .mm-footer { padding: 12px 16px 6px; border-top: 1px solid var(--gray-100); margin-top: 4px; }
  .mm-footer-text { font-size: 12px; color: var(--gray-500); }

  /* PROFILE PANEL */
  .profile-overlay { display: none; position: fixed; inset: 0; z-index: 398; }
  .profile-overlay.open { display: block; }
  .profile-panel { position: fixed; top: 88px; right: max(16px, calc((100vw - 1440px) / 2 + 16px)); z-index: 401; width: 360px; max-height: calc(100vh - 108px); background: var(--cream-bright); border-radius: 20px; box-shadow: 0 12px 32px rgba(28,26,20,0.12); transform: translateY(-8px) scale(0.97); opacity: 0; pointer-events: none; transition: transform 0.2s cubic-bezier(0.4,0,0.2,1), opacity 0.2s ease; display: flex; flex-direction: column; overflow-y: auto; scrollbar-width: none; }
  .profile-panel::-webkit-scrollbar { display: none; }
  .profile-panel.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }
  .pp-header { padding: 16px 16px 14px; position: relative; border-radius: 20px 20px 0 0; }
  .pp-close { position: absolute; top: 12px; right: 12px; background: var(--sand); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--gray-800); transition: background 0.2s; }
  .pp-close:hover { background: var(--gray-100); }
  .pp-user { display: flex; align-items: center; gap: 12px; }
  .pp-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--sand); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--gray-800); flex-shrink: 0; cursor: pointer; }
  .pp-name { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700; color: var(--black); letter-spacing: -0.01em; }
  .pp-email { font-size: 12px; color: var(--gray-500); margin-top: 2px; font-family: 'Inter', sans-serif; font-weight: 400; }
  .pp-body { padding: 8px 8px 16px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .pp-section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-500); padding: 14px 12px 6px; font-family: 'Inter', sans-serif; }
  .pp-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 16px; cursor: pointer; transition: background 0.2s; text-decoration: none; color: var(--black); }
  .pp-item:hover { background: var(--sand); }
  .pp-item-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--sand); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--green-800); flex-shrink: 0; transition: all 0.2s; }
  .pp-item-text { flex: 1; }
  .pp-item-title { font-size: 14px; font-weight: 500; color: var(--black); font-family: 'Inter', sans-serif; }
  .pp-item-sub { font-size: 11px; color: var(--gray-500); margin-top: 1px; font-family: 'Inter', sans-serif; }
  .pp-item-badge { background: var(--green-500); color: var(--cream-bright); border-radius: 20px; padding: 4px 10px; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; font-family: 'DM Sans', sans-serif; }
  .pp-item-arrow { font-size: 16px; color: var(--gray-300); opacity: 0; transition: opacity 0.2s, transform 0.2s; }
  .pp-item:hover .pp-item-arrow { opacity: 1; transform: translateX(4px); }
  .pp-logout { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 16px; cursor: pointer; color: #E84A2E; font-size: 14px; font-weight: 500; border: none; background: none; font-family: 'Inter', sans-serif; width: 100%; transition: background 0.2s; margin-top: 4px; }
  .pp-logout:hover { background: rgba(232,74,46,0.07); }
  .pp-logout .pp-item-icon { background: rgba(232,74,46,0.12); color: #E84A2E; }
  .pp-logout:hover .pp-item-icon { background: rgba(232,74,46,0.18); }

  /* MOBILE */
  @media (max-width: 768px) {
    nav { height: 72px; }
    .nav-inner { padding: 0 16px; gap: 4px; }
    .nav-links { display: none; }
    .nav-right { gap: 0; margin-left: auto; }
    .burger-btn { display: flex; }
    .product-wrap { padding: 0 16px; margin-top: 72px; }
    .product-breadcrumb { padding: 20px 0 16px; font-size: 15px; font-weight: 500; }
    .product-hero { grid-template-columns: 1fr; padding-bottom: 48px; }
    .gallery-sticky { position: static; }
    .gallery-viewport { aspect-ratio: 1/1; }
    .product-info { padding-top: 24px; }
    .pi-brew { padding-top: 24px; }
    .nav-faq { display: none; }
    .product-info h1 { font-size: 26px; }
    .pi-bottom { gap: 14px; }
    .pi-price { font-size: 26px; }

    .reviews-section { padding: 40px 16px; }
    .reviews-header { flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
    .btn-leave-review { margin-left: 0; }
    .reviews-grid { grid-template-columns: 1fr; gap: 24px; }
    .similar-section { padding: 40px 16px; }
    .similar-grid { grid-template-columns: 1fr; gap: 24px; }
    .product-card { display: flex; flex-direction: column; }
    .product-body { flex: 1; padding: 24px; display: flex; flex-direction: column; justify-content: space-between; }
    .product-body h4 { font-size: 24px; font-weight: 900; }
    .product-body p { font-size: 13px; line-height: 1.7; }
    .product-price { font-size: 24px; }
    .product-img { aspect-ratio: 1/1; }
    .btn-add-sm { padding: 14px 28px; font-size: 15px; }
    .btn-add-sm i { font-size: 20px; }
    .profile-panel { top: 76px; right: 8px; left: 8px; width: auto; max-height: calc(100svh - 84px); }
    .pp-header { padding: 14px 14px 12px; }
    .pp-body { padding: 6px 6px 12px; }
    .pp-item-icon { width: 44px; height: 44px; font-size: 22px; }
    .pp-avatar { width: 52px; height: 52px; font-size: 22px; }
    .pp-item { padding: 9px 10px; }
    .pp-section-label { padding: 10px 10px 4px; }
    footer { padding: 60px 24px 32px; }
    .footer-top { grid-template-columns: 1fr; gap: 40px; }
    .footer-bottom { flex-direction: column; align-items: flex-start; gap: 12px; }
    .scroll-top { bottom: 20px; right: 20px; }
  }
  @media (min-width: 769px) and (max-width: 1100px) {
    .similar-grid { grid-template-columns: repeat(3, 1fr); }
    .product-hero { column-gap: 40px; }
  }
</style>
<script src="components/sol-search.js"></script>
<script src="components/sol-nav.js"></script>
<script src="components/sol-footer.js"></script>
</head>
<body>

<sol-nav active="product"></sol-nav>


<div class="product-wrap">
  <div class="product-breadcrumb">
    <a href="sol-shop.html"><i class="hgi-stroke hgi-arrow-left-01"></i> Магазин</a>
    <span class="bc-sep">/</span>
    <span class="bc-current" id="bcName"></span>
  </div>

const AVATAR_COLORS = ['#226F54','#C4855A','#4A4538','#7A7060','#7CC44A','#B5AFA3'];
let currentSlide = 0;
let currentProduct = null;
let selectedGrams = null;

function getCart() { try { return JSON.parse(sessionStorage.getItem('solCart')) || []; } catch(e) { return []; } }
function saveCart(c) { sessionStorage.setItem('solCart', JSON.stringify(c)); }
function getWish() { try { return JSON.parse(sessionStorage.getItem('solWish')) || []; } catch(e) { return []; } }
function saveWish(w) { sessionStorage.setItem('solWish', JSON.stringify(w)); }

function updateCartBadge() {
  const n = getCart().length;
  const el = document.getElementById('cartBadge');
  el.textContent = n;
  el.classList.toggle('visible', n > 0);
}
function updateWishBadge() {
  const n = getWish().length;
  const el = document.getElementById('wishBadge');
  el.textContent = n;
  el.classList.toggle('visible', n > 0);
}
function goToCart() { window.location.href = 'sol-cart.html'; }
function goToProduct(name) { window.location.href = 'sol-product.html?name=' + encodeURIComponent(name); }

function setCartBtnState(btn, inCart) {
  btn.classList.toggle('in-cart', inCart);
  btn.innerHTML = inCart
    ? '<i class="hgi-stroke hgi-checkmark-circle-02"></i> В кошику'
    : '<i class="hgi-stroke hgi-shopping-bag-add"></i> Кошик';
}

function toggleProductCart() {
  if (!currentProduct) return;
  const btn = document.getElementById('piCartBtn');
  const cart = getCart();
  const idx = cart.findIndex(i => i.name === currentProduct.name);
  if (idx !== -1) { cart.splice(idx, 1); } else { cart.push({name: currentProduct.name, qty: 1, grams: selectedGrams}); }
  saveCart(cart);
  updateCartBadge();
  setCartBtnState(btn, idx === -1);
}

function toggleSimilarWish(name, btn) {
  const wish = getWish();
  const idx = wish.indexOf(name);
  if (idx !== -1) wish.splice(idx, 1);
  else wish.push(name);
  saveWish(wish);
  btn.classList.toggle('liked', wish.includes(name));
  updateWishBadge();
}

function toggleProductWish() {
  if (!currentProduct) return;
  const btn = document.getElementById('piWish');
  const wish = getWish();
  const idx = wish.indexOf(currentProduct.name);
  if (idx !== -1) { wish.splice(idx, 1); btn.classList.remove('liked'); }
  else { wish.push(currentProduct.name); btn.classList.add('liked'); }
  saveWish(wish);
  updateWishBadge();
}

function toggleSmCart(name, btn) {
  const cart = getCart();
  const idx = cart.findIndex(i => i.name === name);
  if (idx !== -1) { cart.splice(idx, 1); } else { cart.push({name, qty: 1}); }
  saveCart(cart);
  updateCartBadge();
  setSmCartBtnState(btn, idx === -1);
}
function setSmCartBtnState(btn, inCart) {
  btn.classList.toggle('in-cart', inCart);
  btn.innerHTML = inCart
    ? '<i class="hgi-stroke hgi-checkmark-circle-02"></i> В кошику'
    : '<i class="hgi-stroke hgi-shopping-bag-add"></i> Кошик';
}

function renderGallery(p) {
  const vp = document.getElementById('galleryViewport');
  const nav = document.getElementById('galleryNav');
  const total = p.images || 1;
  const bgs = [p.bg || 'var(--sand)', adjustBg(p.bg, -10), adjustBg(p.bg, 10)];

  let html = '';
  for (let i = 0; i < total; i++) {
    html += `<div class="gallery-slide${i===0?' active':''}" style="background:${bgs[i]||'var(--sand)'}">Фото ${i+1}`;
    if (i === 0 && p.badge) html += `<div class="gallery-badge badge-${p.badge}">${p.badge==='new'?'Новинка':'Обмежений'}</div>`;
    html += '</div>';
  }
  // region + wish overlaid on viewport
  html += `<span class="pi-region" id="piRegion">${p.region||''}</span>`;
  html += `<button class="pi-wish" id="piWish" onclick="toggleProductWish()"><i class="hgi-stroke hgi-favourite"></i></button>`;
  // arrows
  if (total > 1) {
    html += `<button class="gallery-arrow gallery-arrow-prev" id="galleryPrev" onclick="changeSlide(-1)"${currentSlide===0?' disabled':''}><i class="hgi-stroke hgi-arrow-left-01"></i></button>`;
    html += `<button class="gallery-arrow gallery-arrow-next" id="galleryNext" onclick="changeSlide(1)"><i class="hgi-stroke hgi-arrow-right-01"></i></button>`;
  }
  vp.innerHTML = html;
  currentSlide = 0;

  // thumbnails
  if (total > 1) {
    let thumbs = '';
    for (let i = 0; i < total; i++) {
      thumbs += `<div class="gallery-thumb${i===0?' active':''}" style="background:${bgs[i]}" onclick="goToSlide(${i})">Фото ${i+1}</div>`;
    }
    nav.innerHTML = thumbs;
  } else {
    nav.innerHTML = '';
  }

  // swipe
  let tx = 0;
  vp.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
  vp.addEventListener('touchend', e => { if (Math.abs(e.changedTouches[0].clientX - tx) > 40) changeSlide(e.changedTouches[0].clientX < tx ? 1 : -1); });
}

function adjustBg(hex, amt) {
  if (!hex) return 'var(--sand)';
  try {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.min(255, Math.max(0, (n >> 16) + amt));
    const g = Math.min(255, Math.max(0, ((n >> 8) & 0xff) + amt));
    const b = Math.min(255, Math.max(0, (n & 0xff) + amt));
    return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
  } catch { return 'var(--sand)'; }
}

function goToSlide(i) {
  const slides = document.querySelectorAll('.gallery-slide');
  if (!slides[i]) return;
  slides[currentSlide].classList.remove('active');
  slides[i].classList.add('active');
  currentSlide = i;
  // sync thumbs
  document.querySelectorAll('.gallery-thumb').forEach((t, idx) => t.classList.toggle('active', idx === i));
  // sync arrows
  const prev = document.getElementById('galleryPrev');
  const next = document.getElementById('galleryNext');
  if (prev) prev.disabled = i === 0;
  if (next) next.disabled = i === slides.length - 1;
}
function changeSlide(dir) {
  const slides = document.querySelectorAll('.gallery-slide');
  const next = currentSlide + dir;
  if (next < 0 || next >= slides.length) return;
  goToSlide(next);
}

function renderGrams(p) {
  const wrap = document.getElementById('piGramWrap');
  const container = document.getElementById('piGrams');
  if (!p.grams) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  selectedGrams = p.grams[1] || p.grams[0];
  container.innerHTML = p.grams.map((g, i) =>
    `<button class="gram-pill${i===1||p.grams.length===1?' active':''}" onclick="selectGram(this, ${g})">${g}г</button>`
  ).join('');
}
function selectGram(btn, g) {
  document.querySelectorAll('.gram-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  selectedGrams = g;
}

function renderBrew(brew) {
  const wrap = document.getElementById('piBrew');
  const text = document.getElementById('piBrewText');
  wrap.style.display = 'block';
  text.textContent = `Нагрійте воду до ${brew.temp}, засипте ${brew.amount} і заваріть протягом ${brew.time}. Можна повторити ${brew.steeps}.`;
}

function renderReviews(reviews) {
  const lbl = document.getElementById('reviewsCountLbl');
  const grid = document.getElementById('reviewsGrid');
  if (!reviews || reviews.length === 0) {
    lbl.textContent = '';
    grid.innerHTML = '<p class="reviews-empty">Поки що немає відгуків. Будьте першим!</p>';
    return;
  }
  lbl.textContent = reviews.length + ' ' + pluralUk(reviews.length, 'відгук', 'відгуки', 'відгуків');
  grid.innerHTML = reviews.map((r, i) => {
    const initials = r.author.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const color = AVATAR_COLORS[i % AVATAR_COLORS.length];
    return `<div class="testimonial">
      <p class="testimonial-text">${r.text}</p>
      <div class="testimonial-footer">
        <div class="testimonial-user">
          <div class="testimonial-avatar" style="background:${color}">${initials}</div>
          <div><div class="testimonial-name">${r.author}</div><div class="testimonial-handle">${r.date}</div></div>
        </div>
        <span class="testimonial-rating">★ ${Number.isInteger(r.rating) ? r.rating + '.0' : r.rating}</span>
      </div>
    </div>`;
  }).join('');
}

function pluralUk(n, one, few, many) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return one;
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return few;
  return many;
}

function renderSimilar(p) {
  const section = document.getElementById('similarSection');
  const grid = document.getElementById('similarGrid');
  let similar = PRODUCTS.filter(x => x.name !== p.name && x.cat === p.cat);
  if (similar.length < 2) similar = PRODUCTS.filter(x => x.name !== p.name && x.section === p.section);
  similar = similar.slice(0, 4);
  if (similar.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  const cart = getCart();
  const wish = getWish();
  grid.innerHTML = similar.map(s => {
    const inCart = cart.some(c => c.name === s.name);
    const isLiked = wish.includes(s.name);
    const safeName = s.name.replace(/'/g,"\\'");
    return `<div class="product-card" onclick="goToProduct('${safeName}')">
      <div class="product-img"${s.bg?` style="background:${s.bg}"`:''}>Фото
        <div class="product-region">${s.region}</div>
        <button class="product-wish${isLiked?' liked':''}" onclick="event.stopPropagation();toggleSimilarWish('${safeName}',this)"><i class="hgi-stroke hgi-favourite"></i></button>
        ${s.badge==='new'?'<div class="product-badge badge-new">Новинка</div>':''}
        ${s.badge==='limited'?'<div class="product-badge badge-limited">Обмежений</div>':''}
      </div>
      <div class="product-body">
        <h4>${s.name}</h4>
        <p>${s.desc}</p>
        <div class="product-footer">
          <span class="product-price">${s.price}</span>
          <button class="btn-add-sm${inCart?' in-cart':''}" onclick="event.stopPropagation();toggleSmCart('${s.name.replace(/'/g,"\\'")}',this)">
            <i class="hgi-stroke hgi-${inCart?'checkmark-circle-02':'shopping-bag-add'}"></i> ${inCart?'В кошику':'Кошик'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderProduct(p) {
  document.title = p.name + ' — Söl Tea';
  document.getElementById('bcName').textContent = p.name;
  document.getElementById('piName').textContent = p.name;
  document.getElementById('piDesc').textContent = p.desc;
  document.getElementById('piLongDesc').textContent = p.longDesc;
  document.getElementById('piPrice').textContent = p.price;
  renderGallery(p); // piRegion set inside renderGallery
  const wish = getWish();
  if (wish.includes(p.name)) document.getElementById('piWish').classList.add('liked');
  renderGrams(p);
  const cart = getCart();
  setCartBtnState(document.getElementById('piCartBtn'), cart.some(c => c.name === p.name));
  if (p.brew) renderBrew(p.brew);
  renderReviews(p.reviews);
  renderSimilar(p);
}

  document.getElementById('notFound').style.display = 'block';
  document.getElementById('productHero').style.display = 'none';
  document.getElementById('reviewsSection').style.display = 'none';

  renderProduct(currentProduct);

updateCartBadge();
updateWishBadge();

// Scroll top
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTopBtn');
  btn.classList.toggle('visible', window.scrollY > 400);
  const socials = document.querySelector('.footer-socials');
  if (socials) {
    const socialsTop = socials.getBoundingClientRect().top;
    const defaultBottom = window.innerWidth <= 768 ? 20 : 32;
    btn.style.bottom = socialsTop < window.innerHeight
      ? (window.innerHeight - socialsTop + 16) + 'px'
      : defaultBottom + 'px';
  }
});

// Close search on Escape / outside click
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSearch();
});

  const panel = document.getElementById('searchPanel');
  if (panel && panel.classList.contains('open') && !panel.contains(e.target)) closeSearch();
});

}
function toggleMobileMenu() {
  document.getElementById('mobileMenu').classList.toggle('open');
  document.getElementById('mobileMenuOverlay').classList.toggle('open');
}
function highlightText(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark class="search-highlight">$1</mark>');
}
function filterProducts(q) {
  const query = q.trim().toLowerCase();
  const panel = document.getElementById('searchPanel');
  const grid = document.getElementById('searchPanelGrid');
  const empty = document.getElementById('searchPanelEmpty');
  if (!query) { panel.classList.remove('open'); document.body.style.overflow = ''; return; }
  const matches = PRODUCTS.filter(p =>
    p.name.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query)
  );
  const cart = getCart();
  grid.innerHTML = matches.map(p => {
    const inCart = cart.some(c => c.name === p.name);
    const safeN = p.name.replace(/'/g, "\\'");
    return `<div class="product-card show" onclick="goToProduct('${safeN}')">
      <div class="product-img"${p.bg ? ` style="background:${p.bg}"` : ''}>Фото
        ${p.region ? `<div class="product-region">${p.region}</div>` : ''}
        ${p.badge === 'new' ? '<div class="product-badge badge-new">Новинка</div>' : ''}
        ${p.badge === 'limited' ? '<div class="product-badge badge-limited">Обмежений</div>' : ''}
      </div>
      <div class="product-body">
        <h4>${highlightText(p.name, query)}</h4>
        <p class="product-desc">${highlightText(p.desc, query)}</p>
        <div class="product-footer">
          <span class="product-price">${p.price}</span>
          <button class="btn-add${inCart ? ' in-cart' : ''}" onclick="event.stopPropagation();toggleSearchCart('${safeN}',this)">${inCart ? '<i class="hgi-stroke hgi-checkmark-circle-02"></i> В кошику' : '<i class="hgi-stroke hgi-shopping-bag-add"></i> Кошик'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
  empty.style.display = matches.length === 0 ? 'block' : 'none';
  panel.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function toggleSearchCart(name, btn) {
  const cart = getCart();
  const idx = cart.findIndex(c => c.name === name);
  if (idx >= 0) { cart.splice(idx, 1); } else { cart.push({ name, qty: 1 }); }
  saveCart(cart);
  const inCart = idx < 0;
  btn.className = 'btn-add' + (inCart ? ' in-cart' : '');
  btn.innerHTML = inCart ? '<i class="hgi-stroke hgi-checkmark-circle-02"></i> В кошику' : '<i class="hgi-stroke hgi-shopping-bag-add"></i> Кошик';
  updateCartBadge();
}
function onDesktopSearchInput(val) {
  filterProducts(val);
  document.getElementById('desktopSearchClear')?.classList.toggle('visible', val.length > 0);
}
function onDesktopSearchBlur() {}
function clearDesktopSearch() {
  const inp = document.getElementById('desktopSearchInput');
  if (inp) inp.value = '';
  document.getElementById('desktopSearchClear')?.classList.remove('visible');
  filterProducts('');
}
function onNavSearchInput(val) { filterProducts(val); }
function openSearch() {
  if (window.innerWidth <= 768) {
    document.querySelector('nav').classList.add('search-active');
    document.getElementById('navSearchInput').focus();
  } else {
    document.getElementById('desktopSearchInput').focus();
  }
}
function closeSearch() {
  document.querySelector('nav').classList.remove('search-active');
  document.getElementById('navSearchInput').value = '';
  const inp = document.getElementById('desktopSearchInput');
  if (inp) { inp.value = ''; }
  document.getElementById('desktopSearchClear')?.classList.remove('visible');
  filterProducts('');
}
</script>
</body>
</html>
