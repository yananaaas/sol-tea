<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ — Söl Tea</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.hugeicons.com/font/icons.css">
<style>
  :root {
    --cream: #F5F0E8;
    --cream-bright: #FDFCF9;
    --sand: #E8E0CC;
    --green-800: #226F54;
    --green-500: #7CC44A;
    --terra: #C4855A;
    --black: #1C1A14;
    --gray-800: #4A4538;
    --gray-500: #7A7060;
    --gray-300: #B5AFA3;
    --gray-100: #D9D3C7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html { background: var(--cream); overflow-x: hidden; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--black); max-width: 1440px; margin: 0 auto; }

  /* NAV */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 400; background: var(--cream); height: 80px; }
  .nav-inner { max-width: 1440px; margin: 0 auto; height: 100%; display: flex; align-items: center; gap: 32px; padding: 0 48px; }
  .nav-logo { flex-shrink: 0; display: flex; align-items: center; }
  .nav-logo a { display: flex; align-items: center; }
  .nav-logo svg { height: 42px; width: 41px; display: block; }
  .nav-links { display: flex; gap: 36px; list-style: none; flex-shrink: 0; }
  .nav-links a { font-size: 14px; font-weight: 400; color: var(--gray-800); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: var(--green-800); }
  .nav-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .nav-icon-btn { background: none; border: none; cursor: pointer; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: var(--black); transition: background 0.2s; font-size: 22px; position: relative; }
  .nav-icon-btn:hover { background: var(--sand); }
  .nav-icon-btn.active { background: var(--sand); }
  .cart-badge, .wish-badge { position: absolute; top: 2px; right: 2px; min-width: 17px; height: 17px; border-radius: 20px; display: none; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700; color: var(--cream-bright); padding: 0 4px; line-height: 1; }
  .cart-badge { background: var(--green-800); }
  .wish-badge { background: var(--terra); }
  .cart-badge.visible, .wish-badge.visible { display: flex; }

  /* SECTION TAG */
  .section-tag { display: inline-flex; align-self: flex-start; align-items: center; gap: 8px; background: var(--sand); color: var(--gray-800); border-radius: 40px; padding: 10px 20px; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px; }
  .section-tag i { font-size: 16px; }

  /* BUTTONS */
  .btn-primary { background: var(--black); color: var(--cream-bright); border: none; border-radius: 40px; padding: 14px 28px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; display: inline-flex; align-items: center; gap: 10px; text-decoration: none; }
  .btn-primary:hover { background: var(--green-800); }
  .btn-primary i { transform: translateX(3px); margin-right: -4px; transition: transform 0.2s; }
  .btn-primary:hover i { transform: translateX(7px); }
  .faq-hero-inner .btn-primary { margin-top: 32px; }

  /* SCROLL TO TOP */
  .scroll-top { position: fixed; bottom: 32px; right: max(40px, calc((100vw - 1440px) / 2 + 40px)); z-index: 50; width: 48px; height: 48px; background: var(--cream); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; color: var(--gray-500); transition: opacity 0.3s, transform 0.3s, background 0.2s; opacity: 0; pointer-events: none; box-shadow: 0 0 0 1.5px var(--gray-100); }
  .scroll-top.visible { opacity: 1; pointer-events: all; }
  .scroll-top:hover { background: var(--sand); color: var(--green-800); transform: translateY(-3px); }

  /* PROFILE PANEL */
  .profile-overlay { position: fixed; inset: 0; z-index: 200; opacity: 0; pointer-events: none; }
  .profile-overlay.open { opacity: 1; pointer-events: all; }
  .profile-panel {
    position: fixed; top: 88px; right: max(16px, calc((100vw - 1440px) / 2 + 16px)); z-index: 201;
    width: 360px; max-height: calc(100vh - 108px);
    background: var(--cream-bright); border-radius: 20px;
    box-shadow: 0 12px 32px rgba(28,26,20,0.12);
    transform: translateY(-8px) scale(0.97); opacity: 0; pointer-events: none;
    transition: transform 0.2s cubic-bezier(0.4,0,0.2,1), opacity 0.2s ease;
    display: flex; flex-direction: column;
    overflow-y: auto; scrollbar-width: none;
    font-family: 'Inter', sans-serif;
  }
  .profile-panel::-webkit-scrollbar { display: none; }
  .profile-panel.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }
  .pp-header { padding: 16px 16px 14px; position: relative; border-radius: 20px 20px 0 0; }
  .pp-close { position: absolute; top: 12px; right: 12px; background: var(--sand); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--gray-800); transition: background 0.2s; }
  .pp-close:hover { background: var(--gray-100); }
  .pp-user { display: flex; align-items: center; gap: 12px; }
  .pp-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--sand); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--gray-800); flex-shrink: 0; cursor: pointer; }
  .pp-name { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700; color: var(--black); letter-spacing: -0.01em; }
  .pp-email { font-size: 12px; color: var(--gray-500); margin-top: 2px; font-family: 'Inter', sans-serif; font-weight: 400; }
  .pp-body { padding: 8px 8px 16px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .pp-section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-500); padding: 14px 12px 6px; font-family: 'Inter', sans-serif; }
  .pp-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 16px; cursor: pointer; transition: background 0.2s; text-decoration: none; color: var(--black); }
  .pp-item:hover { background: var(--sand); }
  .pp-item-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--sand); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--green-800); flex-shrink: 0; }
  .pp-item-text { flex: 1; }
  .pp-item-title { font-size: 14px; font-weight: 500; color: var(--black); font-family: 'Inter', sans-serif; }
  .pp-item-sub { font-size: 11px; color: var(--gray-500); margin-top: 1px; font-family: 'Inter', sans-serif; }
  .pp-item-badge { background: var(--green-500); color: var(--cream-bright); border-radius: 20px; padding: 4px 10px; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; font-family: 'DM Sans', sans-serif; }
  .pp-item-arrow { font-size: 16px; color: var(--gray-300); opacity: 0; transition: opacity 0.2s, transform 0.2s; }
  .pp-item:hover .pp-item-arrow { opacity: 1; transform: translateX(4px); }
  .pp-logout { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 16px; cursor: pointer; color: #E84A2E; font-size: 14px; font-weight: 500; border: none; background: none; font-family: 'Inter', sans-serif; width: 100%; transition: background 0.2s; margin-top: 4px; }
  .pp-logout:hover { background: rgba(232,74,46,0.07); }
  .pp-logout .pp-item-icon { background: rgba(232,74,46,0.12); color: #E84A2E; }
  .pp-logout:hover .pp-item-icon { background: rgba(232,74,46,0.18); }

  /* BURGER MENU */
  .burger-btn { display: none; background: none; border: none; cursor: pointer; width: 48px; height: 48px; align-items: center; justify-content: center; border-radius: 50%; color: var(--black); font-size: 22px; transition: background 0.2s; flex-shrink: 0; }
  .burger-btn:hover { background: var(--sand); }
  .mobile-menu-overlay { position: fixed; inset: 0; z-index: 200; opacity: 0; pointer-events: none; }
  .mobile-menu-overlay.open { opacity: 1; pointer-events: all; }
  .mobile-menu {
    position: fixed; top: 80px; right: max(16px, calc((100vw - 1440px) / 2 + 16px)); z-index: 201;
    width: 240px; background: var(--sand);
    border-radius: 20px; padding: 8px;
    box-shadow: 0 8px 32px rgba(28,26,20,0.14);
    transform: translateY(-8px) scale(0.97); opacity: 0; pointer-events: none;
    transition: transform 0.2s cubic-bezier(0.4,0,0.2,1), opacity 0.2s ease;
    font-family: 'DM Sans', sans-serif;
  }
  .mobile-menu.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }
  .mm-nav { display: flex; flex-direction: column; gap: 4px; }
  .mm-item { display: flex; align-items: center; padding: 12px 18px; border-radius: 40px; text-decoration: none; color: var(--gray-800); transition: background 0.15s; }
  .mm-item:hover { background: var(--gray-100); }
  .mm-item.active { background: var(--green-800); color: var(--cream-bright); }
  .mm-item-title { font-size: 14px; font-weight: 500; }
  .mm-footer { padding: 8px 18px 4px; border-top: 0.5px solid var(--gray-100); margin-top: 4px; }
  .mm-footer-text { font-size: 11px; color: var(--gray-300); padding: 8px 0; }

  /* SEARCH */

  /* SCROLL ANIMATIONS */
  .fade-up { opacity: 0; transform: translateY(28px); transition: opacity 0.65s ease, transform 0.65s ease; }
  .fade-up.visible { opacity: 1; transform: translateY(0); }
  .fade-up-d1 { transition-delay: 0.1s; }
  .fade-up-d2 { transition-delay: 0.2s; }
  .fade-up-d3 { transition-delay: 0.3s; }

  /* HERO ANIMATION — same as shop */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim-h { animation: fadeUp 0.4s ease 0.05s both; }

  /* FOOTER */

  /* ============================
     FAQ PAGE SPECIFIC
     ============================ */

  /* HERO */
  .faq-hero { margin-top: 80px; background: var(--cream); padding: 52px 48px 24px; }
  .faq-hero-inner { max-width: 800px; }
  .faq-hero h1 { font-family: 'Inter', sans-serif; font-size: clamp(40px, 5vw, 64px); font-weight: 900; line-height: 1.05; color: var(--black); letter-spacing: -0.03em; }

  /* ANCHOR NAV */
  .anchor-nav { position: sticky; top: 80px; z-index: 99; background: var(--cream); padding: 0 48px 36px; }
  .anchor-nav-inner { display: flex; gap: 8px; max-width: 1280px; flex-wrap: wrap; }
  .anchor-pill { background: var(--sand); color: var(--gray-800); border: none; border-radius: 40px; padding: 9px 18px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; white-space: nowrap; }
  .anchor-pill.active { background: var(--green-800); color: var(--cream-bright); }
  @media (hover: hover) { .anchor-pill:hover { background: var(--gray-100); } }
  .anchor-pill-cta { gap: 8px; }
  .anchor-pill-cta i { font-size: 18px; }
  .anchor-pill-cta.active { background: var(--black); color: var(--cream-bright); }

  /* FAQ SECTIONS */
  .faq-section { padding: 0 48px 36px; }
  .faq-section-inner { max-width: 1280px; margin: 0 auto; }
  .faq-section-header { margin-bottom: 32px; }
  .faq-section-header h2 { font-family: 'Inter', sans-serif; font-size: clamp(26px, 3vw, 38px); font-weight: 900; color: var(--black); letter-spacing: -0.02em; }
  .faq-section + .faq-section { border-top: none; }

  /* ACCORDION */
  .faq-list { display: flex; flex-direction: column; gap: 12px; }

  /* SCROLL MARGIN for anchor nav + sticky nav */
  .faq-section { scroll-margin-top: 148px; }

  /* MOBILE */
  @media (max-width: 768px) {
    nav { height: 72px; }
    .nav-inner { padding: 0 16px; gap: 4px; }
    .nav-links { display: none; }
    .nav-faq { display: none; }
    .nav-right { gap: 0; margin-left: auto; }
    .burger-btn { display: flex; }
    .mobile-menu { top: 76px; }
    .scroll-top { bottom: 20px; right: 20px; }
    .profile-panel { top: 76px; right: 8px; left: 8px; width: auto; max-height: calc(100svh - 84px); }
    .pp-header { padding: 14px 14px 12px; }
    .pp-body { padding: 6px 6px 12px; }
    .pp-item-icon { width: 44px; height: 44px; font-size: 22px; }
    .pp-avatar { width: 52px; height: 52px; font-size: 22px; }
    .pp-item { padding: 9px 10px; }
    .pp-section-label { padding: 10px 10px 4px; }

    /* FAQ MOBILE */
    .faq-hero { margin-top: 72px; padding: 24px 24px 20px; }
    .faq-hero h1 { font-size: clamp(28px, 8vw, 40px); }
    .anchor-nav { top: 72px; padding: 0 16px 24px; }
    .anchor-nav-inner { gap: 6px; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .anchor-nav-inner::-webkit-scrollbar { display: none; }
    .anchor-pill { padding: 12px 18px; font-size: 13px; }
    .faq-section { padding: 0 24px 28px; scroll-margin-top: 136px; }
    .faq-section-header { margin-bottom: 24px; }
    .faq-section-header h2 { font-size: 22px; }
  }
  </style>
<script src="components/sol-search.js"></script>
<script src="components/sol-nav.js"></script>
<script src="components/sol-footer.js"></script>
<script src="components/sol-product-card.js"></script>
<script src="components/sol-faq-item.js"></script>
<script src="services/sol-catalog.js"></script>
</head>
<body>

<!-- NAV -->
<sol-nav active="faq"></sol-nav>

<!-- HERO -->
<section class="faq-hero">
  <div class="faq-hero-inner">
    <h1>Часті запитання</h1>
  </div>
</section>

<!-- ANCHOR NAV -->
<nav class="anchor-nav" id="anchorNav">
  <div class="anchor-nav-inner">
    <button class="anchor-pill active" id="pill-delivery" onclick="scrollToSection('faq-delivery')">Доставка</button>
    <button class="anchor-pill" id="pill-payment" onclick="scrollToSection('faq-payment')">Оплата</button>
    <button class="anchor-pill" id="pill-products" onclick="scrollToSection('faq-products')">Товари</button>
    <button class="anchor-pill" id="pill-returns" onclick="scrollToSection('faq-returns')">Повернення</button>
    <button class="anchor-pill anchor-pill-cta" id="pill-cta" onclick="scrollToSection('faq-cta')"><i class="hgi-stroke hgi-message-01"></i> Написати нам</button>
  </div>
</nav>

<!-- DELIVERY -->
<section class="faq-section" id="faq-delivery">
  <div class="faq-section-inner">
    <div class="faq-section-header fade-up">
      <h2>Доставка</h2>
    </div>
    <div class="faq-list">
      <sol-faq-item class="fade-up" question="Скільки часу займає доставка?" answer="Доставка по Україні займає 1–3 робочі дні залежно від міста. Після відправлення ви отримаєте SMS або email з номером для відстеження посилки."></sol-faq-item>
      <sol-faq-item class="fade-up fade-up-d1" question="Куди ви доставляєте?" answer="Ми доставляємо по всій Україні через Нову Пошту та Укрпошту. Доставка за кордон поки що не здійснюється, але ми над цим працюємо — слідкуйте за оновленнями."></sol-faq-item>
      <sol-faq-item class="fade-up fade-up-d2" question="Як відстежити посилку?" answer="Після відправлення ми надсилаємо SMS або email з ТТН Нової Пошти. Відстежити статус посилки можна на сайті novaposhta.ua або в додатку Нової Пошти."></sol-faq-item>
      <sol-faq-item class="fade-up fade-up-d3" question="Яка вартість доставки?" answer="Вартість доставки розраховується автоматично при оформленні замовлення залежно від ваги та міста. При замовленні від 2000 грн — доставка безкоштовна."></sol-faq-item>
    </div>
  </div>
</section>

<!-- PAYMENT -->
<section class="faq-section" id="faq-payment">
  <div class="faq-section-inner">
    <div class="faq-section-header fade-up">
      <h2>Оплата</h2>
    </div>
    <div class="faq-list">
      <sol-faq-item class="fade-up" question="Які способи оплати ви приймаєте?" answer="Ми приймаємо оплату карткою Visa та Mastercard, Apple Pay, Google Pay, а також накладений платіж при отриманні в Новій Пошті."></sol-faq-item>
      <sol-faq-item class="fade-up fade-up-d1" question="Чи безпечна оплата на сайті?" answer="Так, всі платіжні транзакції проходять через захищену платіжну систему з SSL-шифруванням. Ми не зберігаємо дані вашої картки."></sol-faq-item>
      <sol-faq-item class="fade-up fade-up-d2" question="Чи можна оплатити при отриманні?" answer="Так, ви можете обрати накладений платіж при оформленні замовлення. Оплата здійснюється готівкою або карткою у відділенні Нової Пошти при отриманні."></sol-faq-item>
    </div>
  </div>
</section>

<!-- PRODUCTS -->
<section class="faq-section" id="faq-products">
  <div class="faq-section-inner">
    <div class="faq-section-header fade-up">
      <h2>Товари</h2>
    </div>
    <div class="faq-list">
      <sol-faq-item class="fade-up" question="Як зберігати чай після відкриття?" answer="Зберігайте чай у сухому темному місці в герметичній упаковці або жестяній банці. Уникайте впливу вологи, прямого сонця та сильних запахів — чай добре їх поглинає."></sol-faq-item>
      <sol-faq-item class="fade-up fade-up-d1" question="Звідки ви берете чай?" answer="Ми працюємо безпосередньо з фермерами в Китаї — переважно з провінцій Фуцзянь, Юньнань та Гуандун. Кожен сорт проходить особисту дегустацію перед тим, як потрапити в наш каталог. Жодних посередників."></sol-faq-item>
      <sol-faq-item class="fade-up fade-up-d2" question="Чи є мінімальне замовлення?" answer="Ні, мінімального замовлення немає. Ви можете замовити навіть один пакет 50 г. Але пам&#39;ятайте: при замовленні від 2000 грн доставка безкоштовна."></sol-faq-item>
      <sol-faq-item class="fade-up fade-up-d3" question="Чи є чай у подарункових упаковках?" answer="Так, у нашому магазині є подарункові набори в красивому упакуванні. Їх можна знайти в розділі &quot;Набори&quot;. Також ми можемо оформити будь-яке замовлення як подарунок — напишіть нам."></sol-faq-item>
    </div>
  </div>
</section>

<!-- RETURNS -->
<section class="faq-section" id="faq-returns">
  <div class="faq-section-inner">
    <div class="faq-section-header fade-up">
      <h2>Повернення</h2>
    </div>
    <div class="faq-list">
      <sol-faq-item class="fade-up" question="Чи можна повернути товар?" answer="Так, ви можете повернути товар протягом 14 днів з моменту отримання за умови збереження оригінального пакування та якщо товар не був у використанні. Харчові продукти (чай) не підлягають поверненню, якщо упаковка розпечатана."></sol-faq-item>
      <sol-faq-item class="fade-up fade-up-d1" question="Що робити, якщо товар пошкоджений?" answer="Напишіть нам протягом 48 годин після отримання і прикріпіть фото пошкодження. Ми відправимо новий товар або повернемо кошти — на ваш вибір."></sol-faq-item>
      <sol-faq-item class="fade-up fade-up-d2" question="Скільки часу займає повернення коштів?" answer="Після підтвердження повернення кошти надходять на ваш рахунок протягом 3–5 робочих днів залежно від банку."></sol-faq-item>
    </div>
  </div>
</section>

<!-- CTA -->
<section class="faq-section" id="faq-cta">
  <div class="faq-section-inner">
    <a href="mailto:hello@sol-tea.com" class="btn-primary fade-up">Написати нам <i class="hgi-stroke hgi-arrow-right-01"></i></a>
  </div>
</section>


<!-- FOOTER -->
<sol-footer></sol-footer>

<button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="hgi-stroke hgi-arrow-up-01"></i></button>

<script>
// SCROLL ANIMATIONS
const scrollObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('visible');
  });
}, { threshold: 0.12 });
document.querySelectorAll('.fade-up').forEach(el => scrollObserver.observe(el));

// NAV
function toggleMobileMenu() {
  const menu = document.getElementById('mobileMenu');
  const overlay = document.getElementById('mobileMenuOverlay');
  const isOpen = menu.classList.contains('open');
  menu.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
  document.body.style.overflow = isOpen ? '' : 'hidden';
}
function toggleProfile() {
  const panel = document.getElementById('profilePanel');
  const overlay = document.getElementById('profileOverlay');
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeSearch();
    document.querySelector('nav').classList.remove('search-active');
    document.getElementById('profilePanel').classList.remove('open');
    document.getElementById('profileOverlay').classList.remove('open');
    document.getElementById('mobileMenu').classList.remove('open');
    document.getElementById('mobileMenuOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
});

// SCROLL TOP
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTopBtn');
  btn.classList.toggle('visible', window.scrollY > 400);
  const socials = document.querySelector('.footer-socials');
  if (socials) {
    const socialsTop = socials.getBoundingClientRect().top;
    const defaultBottom = window.innerWidth <= 768 ? 20 : 32;
    btn.style.bottom = socialsTop < window.innerHeight
      ? (window.innerHeight - socialsTop + 16) + 'px'
      : defaultBottom + 'px';
  }
});

// CART / WISH BADGES
function getCart() { try { return JSON.parse(sessionStorage.getItem('solCart')||'[]'); } catch(e) { return []; } }
function updateCartBadge() {
  const b = document.getElementById('cartBadge'); if (!b) return;
  const t = getCart().reduce((s,i)=>s+i.qty,0);
  b.textContent = t; b.classList.toggle('visible', t > 0);
}
function updateWishBadge() {
  const b = document.getElementById('wishBadge'); if (!b) return;
  const w = JSON.parse(sessionStorage.getItem('solWish')||'[]');
  b.textContent = w.length; b.classList.toggle('visible', w.length > 0);
}
updateCartBadge();
updateWishBadge();

// ANCHOR NAV
const sectionIds = ['faq-delivery', 'faq-payment', 'faq-products', 'faq-returns', 'faq-cta'];
const pillMap = {
  'faq-delivery': 'pill-delivery',
  'faq-payment': 'pill-payment',
  'faq-products': 'pill-products',
  'faq-returns': 'pill-returns',
  'faq-cta': 'pill-cta'
};

let pillLocked = false;
let pillLockTimer = null;

function scrollToSection(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth' });
  setActivePill(id);
  pillLocked = true;
  clearTimeout(pillLockTimer);
  pillLockTimer = setTimeout(() => { pillLocked = false; }, 900);
}

function setActivePill(id) {
  document.querySelectorAll('.anchor-pill').forEach(p => p.classList.remove('active'));
  const pill = document.getElementById(pillMap[id]);
  if (pill) pill.classList.add('active');
}

// IntersectionObserver for anchor nav highlight
const anchorObserver = new IntersectionObserver((entries) => {
  if (pillLocked) return;
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      setActivePill(entry.target.id);
    }
  });
}, {
  rootMargin: '-20% 0px -70% 0px',
  threshold: 0
});
sectionIds.forEach(id => {
  const el = document.getElementById(id);
  if (el) anchorObserver.observe(el);
});

</script>
