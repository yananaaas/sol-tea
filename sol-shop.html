<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Магазин — Söl Tea</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.hugeicons.com/font/icons.css">
<style>
  :root {
    --cream: #F5F0E8; --cream-bright: #FDFCF9; --sand: #E8E0CC;
    --green-800: #226F54; --green-500: #7CC44A; --terra: #C4855A;
    --black: #1C1A14; --gray-800: #4A4538; --gray-500: #7A7060;
    --gray-300: #B5AFA3; --gray-100: #D9D3C7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html { background: var(--cream); overflow-x: hidden; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--black); max-width: 1440px; margin: 0 auto; }

  /* NAV */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 400; background: var(--cream); height: 80px; }
  .nav-inner { max-width: 1440px; margin: 0 auto; height: 100%; display: flex; align-items: center; gap: 32px; padding: 0 48px; }
  .nav-logo { flex-shrink: 0; display: flex; align-items: center; }
  .nav-logo a { display: flex; align-items: center; }
  .nav-logo svg { height: 42px; width: 41px; display: block; }
  .nav-links { display: flex; gap: 36px; list-style: none; flex-shrink: 0; }
  .nav-links a { font-size: 14px; font-weight: 400; color: var(--gray-800); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: var(--green-800); }
  .nav-links a.active { color: var(--green-800); font-weight: 500; }
  .nav-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .nav-icon-btn { background: none; border: none; cursor: pointer; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: var(--black); transition: background 0.2s; font-size: 22px; position: relative; }
  .nav-icon-btn:hover { background: var(--sand); }
  .cart-badge, .wish-badge { position: absolute; top: 2px; right: 2px; min-width: 17px; height: 17px; border-radius: 20px; display: none; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700; color: var(--cream-bright); padding: 0 4px; line-height: 1; }
  .cart-badge { background: var(--green-800); }
  .wish-badge { background: var(--terra); }
  .cart-badge.visible, .wish-badge.visible { display: flex; }
  .burger-btn { display: none; background: none; border: none; cursor: pointer; width: 48px; height: 48px; align-items: center; justify-content: center; border-radius: 50%; color: var(--black); font-size: 22px; transition: background 0.2s; flex-shrink: 0; }
  .burger-btn:hover { background: var(--sand); }

  /* BUTTONS */
  
  /* PAGE WRAP */
  .page-wrap { max-width: 1280px; margin: 0 auto; padding: 0 48px; }

  /* PAGE LOAD ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim-h { animation: fadeUp 0.4s ease 0.05s both; }
  .anim-tabs { animation: fadeUp 0.4s ease 0.15s both; }
  .anim-filters { animation: fadeUp 0.4s ease 0.22s both; }


  /* SHOP HEADER */
  .shop-header { padding-top: 132px; padding-bottom: 24px; display: flex; align-items: flex-end; justify-content: space-between; }
  .shop-header h1 { font-family: 'Inter', sans-serif; font-size: clamp(40px, 5vw, 64px); font-weight: 900; color: var(--black); letter-spacing: -0.03em; line-height: 1; }
  .shop-header-meta { font-size: 14px; color: var(--gray-500); padding-bottom: 8px; }

  /* CUSTOM DROPDOWN */
  .cat-dropdown {
    position: relative;
    flex-shrink: 0;
    user-select: none;
    z-index: 200;
  }
  .cat-trigger {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--sand);
    color: var(--gray-800);
    border: none; border-radius: 40px;
    padding: 9px 16px 9px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .cat-trigger:hover { background: var(--gray-100); }
  .cat-trigger i { font-size: 16px; color: var(--gray-500); transition: transform 0.2s; }
  .cat-dropdown.open .cat-trigger { background: var(--gray-100); }
  .cat-dropdown.open .cat-trigger i { transform: rotate(180deg); }

  .cat-menu {
    position: absolute;
    top: calc(100% + 8px); left: 0;
    background: var(--sand);
    border-radius: 20px;
    padding: 8px;
    min-width: 180px;
    display: flex; flex-direction: column; gap: 4px;
    box-shadow: 0 8px 24px rgba(28,26,20,0.10);
    opacity: 0; pointer-events: none;
    transform: translateY(-6px);
    transition: opacity 0.18s ease, transform 0.18s ease;
    z-index: 200;
  }
  .cat-dropdown.open .cat-menu {
    opacity: 1; pointer-events: all;
    transform: translateY(0);
  }
  .cat-option {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px;
    border-radius: 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    color: var(--gray-800);
    cursor: pointer;
    transition: background 0.15s;
  }
  .cat-option:hover { background: var(--gray-100); }
  .cat-option.active {
    background: var(--green-800);
    color: var(--cream-bright);
    font-weight: 500;
  }

  /* FILTER BAR — категорія + теги в одному рядку */
  .filter-bar { display: flex; align-items: center; gap: 12px; padding-bottom: 36px; flex-wrap: wrap; position: relative; z-index: 100; }
  .filter-pills { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
  .filter-pill {
    background: var(--sand); color: var(--gray-800); border-radius: 40px; padding: 9px 18px;
    font-size: 13px; font-weight: 500; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s; white-space: nowrap; display: inline-flex; align-items: center; gap: 7px;
  }
  .filter-pill:hover { background: var(--gray-100); }
  .filter-pill.active { background: var(--green-800); color: var(--cream-bright); }

  .sort-btn { display: flex; align-items: center; gap: 8px; background: var(--sand); border-radius: 40px; padding: 10px 20px; font-size: 13px; color: var(--gray-800); cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: background 0.2s; white-space: nowrap; flex-shrink: 0; }
  .sort-btn:hover { background: var(--gray-100); }
  .sort-btn i { font-size: 18px; }

  /* PRODUCTS GRID */
  .products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; position: relative; z-index: 1; }

  .empty-state { grid-column: 1/-1; padding: 60px 0; text-align: center; color: var(--gray-500); font-size: 18px; display: none; }
  .empty-state.visible { display: block; }


  /* SCROLL TO TOP */
  .scroll-top { position: fixed; bottom: 32px; right: max(40px, calc((100vw - 1440px) / 2 + 40px)); z-index: 50; width: 48px; height: 48px; background: var(--cream); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; color: var(--gray-500); transition: opacity 0.3s, transform 0.3s, background 0.2s; opacity: 0; pointer-events: none; box-shadow: 0 0 0 1.5px var(--gray-100); }
  .scroll-top.visible { opacity: 1; pointer-events: all; }
  .scroll-top:hover { background: var(--sand); color: var(--green-800); transform: translateY(-3px); }

  /* FOOTER */

  /* MOBILE MENU */
  .mobile-menu-overlay { position: fixed; inset: 0; z-index: 200; opacity: 0; pointer-events: none; }
  .mobile-menu-overlay.open { opacity: 1; pointer-events: all; }
  .mobile-menu { position: fixed; top: 76px; right: max(16px, calc((100vw - 1440px) / 2 + 16px)); z-index: 201; width: 240px; background: var(--sand); border-radius: 20px; padding: 8px; box-shadow: 0 8px 32px rgba(28,26,20,0.14); transform: translateY(-8px) scale(0.97); opacity: 0; pointer-events: none; transition: transform 0.2s cubic-bezier(0.4,0,0.2,1), opacity 0.2s ease; font-family: 'DM Sans', sans-serif; }
  .mobile-menu.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }
  .mm-header { display: none; }
  .mm-nav { display: flex; flex-direction: column; gap: 4px; }
  .mm-item { display: flex; align-items: center; padding: 12px 18px; border-radius: 40px; text-decoration: none; color: var(--gray-800); transition: background 0.15s; }
  .mm-item:hover { background: var(--gray-100); }
  .mm-item.active { background: var(--green-800); color: var(--cream-bright); }
  .mm-item-title { font-size: 14px; font-weight: 500; }
  .mm-footer { padding: 8px 18px 4px; border-top: 0.5px solid var(--gray-100); margin-top: 4px; }
  .mm-footer-text { font-size: 11px; color: var(--gray-300); font-family: 'DM Sans', sans-serif; padding: 8px 0; }

  /* PROFILE PANEL */
  .profile-overlay { position: fixed; inset: 0; z-index: 200; opacity: 0; pointer-events: none; }
  .profile-overlay.open { opacity: 1; pointer-events: all; }
  .profile-panel { position: fixed; top: 88px; right: max(16px, calc((100vw - 1440px) / 2 + 16px)); z-index: 201; width: 360px; max-height: calc(100vh - 108px); background: var(--cream-bright); border-radius: 20px; box-shadow: 0 12px 32px rgba(28,26,20,0.12); transform: translateY(-8px) scale(0.97); opacity: 0; pointer-events: none; transition: transform 0.2s cubic-bezier(0.4,0,0.2,1), opacity 0.2s ease; display: flex; flex-direction: column; overflow-y: auto; scrollbar-width: none; font-family: 'Inter', sans-serif; }
  .profile-panel::-webkit-scrollbar { display: none; }
  .profile-panel.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }
  .pp-header { padding: 16px 16px 14px; position: relative; border-radius: 20px 20px 0 0; }
  .pp-close { position: absolute; top: 12px; right: 12px; background: var(--sand); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--gray-800); transition: background 0.2s; }
  .pp-close:hover { background: var(--gray-100); }
  .pp-user { display: flex; align-items: center; gap: 12px; }
  .pp-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--sand); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--gray-800); flex-shrink: 0; cursor: pointer; }
  .pp-name { font-size: 15px; font-weight: 700; color: var(--black); letter-spacing: -0.01em; }
  .pp-email { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
  .pp-body { padding: 8px 8px 16px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .pp-section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-500); padding: 14px 12px 6px; }
  .pp-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 16px; cursor: pointer; transition: background 0.2s; text-decoration: none; color: var(--black); }
  .pp-item:hover { background: var(--sand); }
  .pp-item-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--sand); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--green-800); flex-shrink: 0; }
  .pp-item-text { flex: 1; }
  .pp-item-title { font-size: 14px; font-weight: 500; color: var(--black); }
  .pp-item-sub { font-size: 11px; color: var(--gray-500); margin-top: 1px; }
  .pp-item-badge { background: var(--green-500); color: var(--cream-bright); border-radius: 20px; padding: 4px 10px; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; font-family: 'DM Sans', sans-serif; }
  .pp-item-arrow { font-size: 16px; color: var(--gray-300); opacity: 0; transition: opacity 0.2s, transform 0.2s; }
  .pp-item:hover .pp-item-arrow { opacity: 1; transform: translateX(4px); }
  .pp-logout { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 16px; cursor: pointer; color: #E84A2E; font-size: 14px; font-weight: 500; border: none; background: none; font-family: 'Inter', sans-serif; width: 100%; transition: background 0.2s; margin-top: 4px; }
  .pp-logout:hover { background: rgba(232,74,46,0.07); }
  .pp-logout .pp-item-icon { background: rgba(232,74,46,0.15); color: #E84A2E; }

  /* MOBILE */
  @media (max-width: 768px) {
    .burger-btn { display: flex; }
    nav { height: 72px; }
    .nav-inner { padding: 0 16px; gap: 4px; }
    .nav-links { display: none; }
    .nav-right { gap: 0; margin-left: auto; }
    .nav-faq { display: none; }
    .page-wrap { padding: 0 16px; overflow-x: hidden; }
    .shop-header { padding-top: 96px; padding-bottom: 24px; }
    .shop-header h1 { font-size: clamp(28px, 8vw, 40px); }
    .section-tabs { flex-wrap: wrap; gap: 8px; }
    .filter-bar { flex-wrap: wrap; gap: 8px; padding-bottom: 24px; align-items: center; }
    .cat-dropdown { order: 1; flex-shrink: 0; }
    .sort-btn { order: 2; flex-shrink: 0; padding: 12px 20px; }
    .filter-pills { order: 3; width: 100%; flex: none; gap: 8px; }
    .cat-trigger { padding: 12px 20px; font-size: 14px; }
    .filter-pill { padding: 12px 18px; font-size: 13px; }
    .products-grid { grid-template-columns: 1fr; gap: 24px; }
    footer { padding: 60px 24px 32px; }
    .footer-top { grid-template-columns: 1fr; gap: 40px; }
    .footer-bottom { flex-direction: column; align-items: flex-start; gap: 12px; }
    .scroll-top { bottom: 20px; right: 20px; }
    .profile-panel { top: 76px; right: 8px; left: 8px; width: auto; max-height: calc(100svh - 84px); }
    .pp-header { padding: 14px 14px 12px; }
    .pp-body { padding: 6px 6px 12px; }
    .pp-item-icon { width: 44px; height: 44px; font-size: 22px; }
    .pp-avatar { width: 52px; height: 52px; font-size: 22px; }
    .pp-item { padding: 9px 10px; }
    .pp-section-label { padding: 10px 10px 4px; }
  }
  @media (min-width: 769px) and (max-width: 1100px) {
    .products-grid { grid-template-columns: repeat(3, 1fr); gap: 40px; }
  }
</style>
<script src="components/sol-search.js"></script>
<script src="components/sol-nav.js"></script>
<script src="components/sol-footer.js"></script>
<script src="components/sol-product-card.js"></script>
<script src="components/sol-pagination.js"></script>
<script src="components/sol-catalog.js"></script>
</head>
<body>

<!-- NAV -->
<sol-nav active="shop"></sol-nav>

<div class="page-wrap">
  <div class="shop-header">
    <h1>Магазин</h1>
    <span class="shop-header-meta" id="resultCount">83 товари</span>
  </div>

  <div class="filter-bar anim-tabs">
    <div class="cat-dropdown" id="catDropdown">
      <button class="cat-trigger" onclick="toggleCatDropdown()">
        <span id="catLabel">Чай</span>
        <i class="hgi-stroke hgi-arrow-down-01"></i>
      </button>
      <div class="cat-menu" id="catMenu">
        <div class="cat-option active" data-section="tea" onclick="selectCategory(this)">Чай</div>
        <div class="cat-option" data-section="teaware" onclick="selectCategory(this)">Посуд</div>
        <div class="cat-option" data-section="boards" onclick="selectCategory(this)">Дошки</div>
        <div class="cat-option" data-section="accessories" onclick="selectCategory(this)">Аксесуари</div>
      </div>
    </div>
    <div class="filter-pills" id="filterPills"></div>
    <button class="sort-btn"><i class="hgi-stroke hgi-filter-horizontal"></i> Сортування</button>
  </div>

  <div class="products-grid" id="productsGrid"></div>
  <div class="empty-state" id="emptyState">Нічого не знайдено</div>

  <sol-pagination id="paginationContainer"></sol-pagination>
</div>

<button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="hgi-stroke hgi-arrow-up-01"></i></button>

<sol-footer></sol-footer>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
function openSearch() { openMobileSearch(); }
function closeSearch() { closeMobileSearch(); }
function clearDesktopSearch() { clearDesktopShopSearch(); }
function onDesktopSearchInput(val) { onDesktopShopSearch(val); }
function onDesktopSearchBlur() { onDesktopShopBlur(); }
function onNavSearchInput(val) { onSearchInput(val); }
const SECTIONS = {
  tea: {
    filters: [
      {key:'all',label:'Всі'},{key:'oolong',label:'Улун'},
      {key:'puer',label:'Пуер'},{key:'seasonal',label:'Сезонне'},{key:'sets',label:'Набори'}
    ]
  },
  teaware: {
    filters: [
      {key:'all',label:'Всі'},{key:'gaiwans',label:'Гайвані'},
      {key:'teapots',label:'Чайники'},{key:'bowls',label:'Піали'},
      {key:'pitchers',label:'Глечики'},{key:'kettles',label:'Кетлі'}
    ]
  },
  boards: {
    filters: [
      {key:'all',label:'Всі'},{key:'bamboo',label:'Бамбук'},
      {key:'wood',label:'Дерево'},{key:'stone',label:'Камінь'}
    ]
  },
  accessories: {
    filters: [
      {key:'all',label:'Всі'},{key:'tools',label:'Інструменти'},
      {key:'store',label:'Зберігання'},{key:'other',label:'Інше'}
    ]
  }
};
let allProducts = [];

let currentSection = 'tea';
let activeFilters = [];
let currentPage = 1;
let searchQuery = '';
const ITEMS_PER_PAGE = 8;

function renderFilters() {
  const container = document.getElementById('filterPills');
  container.innerHTML = SECTIONS[currentSection].filters.map(f => {
    const isAll = f.key === 'all';
    const active = isAll ? activeFilters.length === 0 : activeFilters.includes(f.key);
    return `<button class="filter-pill${active ? ' active' : ''}" data-filter="${f.key}" onclick="filterSwitch(this)">${f.label}</button>`;
  }).join('');
}

function highlightText(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark class="search-highlight">$1</mark>');
}

function renderCards() {
  const products = allProducts.filter(p => p.section === currentSection);
  const grid = document.getElementById('productsGrid');
  const empty = document.getElementById('emptyState');
  let visible = activeFilters.length === 0 ? products : products.filter(p => activeFilters.includes(p.cat));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    visible = visible.filter(p => p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q));
  }

  const n = visible.length;
  const lastTwo = n % 100;
  const lastOne = n % 10;
  let word;
  if (lastTwo >= 11 && lastTwo <= 19) word = ' товарів';
  else if (lastOne === 1) word = ' товар';
  else if (lastOne >= 2 && lastOne <= 4) word = ' товари';
  else word = ' товарів';
  document.getElementById('resultCount').textContent = n + word;

  if (!visible.length) { grid.innerHTML = ''; empty.classList.add('visible'); renderPagination(0); return; }
  empty.classList.remove('visible');

  const totalPages = Math.ceil(visible.length / ITEMS_PER_PAGE);
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * ITEMS_PER_PAGE;
  const pageItems = visible.slice(start, start + ITEMS_PER_PAGE);

  const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
  grid.innerHTML = pageItems.map((p, i) => `
    <sol-product-card
      name="${esc(p.name)}"
      region="${esc(p.region)}"
      desc="${esc(p.desc)}"
      price="${esc(SolCatalog.formatPrice(p.price, p.currency))}"
      bg="${esc(p.bg||'')}"
      badge="${esc(p.badge||'')}"
      index="${i}"
      search="${esc(searchQuery||'')}"></sol-product-card>
  `).join('');

  // Trigger animation: two rAF frames so browser paints initial opacity:0 first
  requestAnimationFrame(() => requestAnimationFrame(() => {
    grid.querySelectorAll('sol-product-card').forEach(c => c.show && c.show());
  }));

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const container = document.getElementById('paginationContainer');
  if (!container) return;
  container.setAttribute('total', totalPages);
  container.setAttribute('current', currentPage);
}

function goToPage(page) {
  const products = allProducts.filter(p => p.section === currentSection);
  const visible = activeFilters.length === 0 ? products : products.filter(p => activeFilters.includes(p.cat));
  const totalPages = Math.ceil(visible.length / ITEMS_PER_PAGE);
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  renderCards();
}

function toggleCatDropdown() {
  document.getElementById('catDropdown').classList.toggle('open');
}
function selectCategory(el) {
  // Оновити активний пункт
  document.querySelectorAll('.cat-option').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  // Оновити лейбл тригера
  document.getElementById('catLabel').textContent = el.textContent;
  // Закрити меню
  document.getElementById('catDropdown').classList.remove('open');
  // Перемкнути секцію
  currentSection = el.dataset.section;
  activeFilters = [];
  currentPage = 1;
  renderFilters();
  renderCards();
}
// Закрити dropdown при кліку поза ним
document.addEventListener('click', function(e) {
  const dd = document.getElementById('catDropdown');
  if (dd && !dd.contains(e.target)) dd.classList.remove('open');
});

function filterSwitch(el) {
  const key = el.dataset.filter;
  // Single-select: просто встановлюємо один активний фільтр
  activeFilters = key === 'all' ? [] : [key];
  currentPage = 1;
  renderFilters();
  renderCards();
}

function updateWishBadge() {
  const b = document.getElementById('wishBadge'); if (!b) return;
  const w = JSON.parse(sessionStorage.getItem('solWish')||'[]');
  b.textContent = w.length; b.classList.toggle('visible', w.length > 0);
}
function toggleWish(el, name) {
  const wish = JSON.parse(sessionStorage.getItem('solWish')||'[]');
  const idx = wish.indexOf(name);
  if (idx === -1) { wish.push(name); el.classList.add('liked'); el.style.color = 'var(--terra)'; }
  else { wish.splice(idx, 1); el.classList.remove('liked'); el.style.color = ''; }
  sessionStorage.setItem('solWish', JSON.stringify(wish));
  updateWishBadge();
}

function getCart() { try { return JSON.parse(sessionStorage.getItem('solCart')||'[]'); } catch(e) { return []; } }
function saveCart(c) { sessionStorage.setItem('solCart', JSON.stringify(c)); }
function updateCartBadge() {
  const b = document.getElementById('cartBadge'); if (!b) return;
  const t = getCart().reduce((s,i)=>s+i.qty,0);
  if (t > 0) { b.textContent = t; b.classList.add('visible'); } else b.classList.remove('visible');
}
function setCartBtnState(btn, inCart) {
  btn.classList.toggle('in-cart', inCart);
  btn.innerHTML = inCart
    ? '<i class="hgi-stroke hgi-checkmark-circle-02"></i> В кошику'
    : '<i class="hgi-stroke hgi-shopping-bag-add"></i> Кошик';
}
function addToCart(name, btn) {
  const cart = getCart();
  const idx = cart.findIndex(i => i.name === name);
  if (idx !== -1) { cart.splice(idx, 1); } else { cart.push({name, qty: 1}); }
  saveCart(cart); updateCartBadge();
  setCartBtnState(btn, idx === -1);
}
function goToCart() { window.location.href = 'sol-cart.html'; }
function goToProduct(name) { window.location.href = 'sol-product.html?name=' + encodeURIComponent(name); }

function toggleWishlist() {
  // wishlist panel — буде реалізовано пізніше
}

function onSearchInput(value) {
  searchQuery = value;
  currentPage = 1;
  renderCards();
}
function onDesktopShopSearch(val) {
  searchQuery = val;
  currentPage = 1;
  renderCards();
  document.getElementById('desktopSearchClear').classList.toggle('visible', val.length > 0);
}
function onDesktopShopBlur() {
  // Don't clear on blur — search stays active until X is clicked or Escape pressed
}
function clearDesktopShopSearch() {
  const inp = document.getElementById('desktopSearchInput');
  inp.value = '';
  searchQuery = '';
  currentPage = 1;
  renderCards();
  document.getElementById('desktopSearchClear').classList.remove('visible');
}
function openMobileSearch() {
  if (window.innerWidth <= 768) {
    document.querySelector('nav').classList.add('search-active');
    const inp = document.getElementById('navSearchInput');
    inp.value = searchQuery;
    inp.focus();
  } else {
    document.getElementById('desktopSearchInput').focus();
  }
}
function closeMobileSearch() {
  document.querySelector('nav').classList.remove('search-active');
  document.getElementById('navSearchInput').value = '';
  searchQuery = '';
  currentPage = 1;
  renderCards();
}

function toggleMobileMenu() {
  const m = document.getElementById('mobileMenu'), o = document.getElementById('mobileMenuOverlay');
  const open = m.classList.contains('open');
  m.classList.toggle('open',!open); o.classList.toggle('open',!open);
}
function toggleProfile() {
  const p = document.getElementById('profilePanel'), o = document.getElementById('profileOverlay');
  const open = p.classList.contains('open');
  p.classList.toggle('open',!open); o.classList.toggle('open',!open);
  document.body.style.overflow = open ? '' : 'hidden';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeMobileSearch();
    ['profilePanel','profileOverlay','mobileMenu','mobileMenuOverlay'].forEach(id => document.getElementById(id).classList.remove('open'));
    document.body.style.overflow = '';
  }
});
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTopBtn');
  btn.classList.toggle('visible', window.scrollY > 400);
  const socials = document.querySelector('.footer-socials');
  if (socials) {
    const socialsTop = socials.getBoundingClientRect().top;
    const defaultBottom = window.innerWidth <= 768 ? 20 : 32;
    btn.style.bottom = socialsTop < window.innerHeight
      ? (window.innerHeight - socialsTop + 16) + 'px'
      : defaultBottom + 'px';
  }
});

SolCatalog.load().then(data => {
  allProducts = data;
  renderFilters();
  renderCards();
}).catch(err => {
  console.error('[sol-shop] failed to load products', err);
});

updateCartBadge();
updateWishBadge();

document.getElementById('paginationContainer').addEventListener('page-change', e => goToPage(e.detail.page));

// Re-render when restored from bfcache (browser back button)
window.addEventListener('pageshow', (e) => { if (e.persisted && allProducts.length) renderCards(); });
</script>
